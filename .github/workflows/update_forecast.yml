name: CPC Wind Forecast Pipeline

on:
  schedule:
    # 台灣時間每日 15:15（即 UTC 07:15）自動觸發，避免 GitHub Actions 整點擁塞與信件延遲
    - cron: '15 7 * * *'
  workflow_dispatch:
    # 允許手動觸發
  repository_dispatch:
    types: [trigger-forecast-update]

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies (LibreOffice & Tesseract)
      run: |
        sudo apt-get update
        sudo apt-get install -y libreoffice tesseract-ocr --no-install-recommends

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python-headless requests firebase-admin numpy pytesseract

    - name: Create Config Files from Secrets
      run: |
        echo '${{ secrets.CONFIG_JSON }}' > config.json
        echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json

    - name: Run Pipeline
      run: |
        python main.py

    - name: Commit and Push Updated data.json
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add data.json
        git diff --staged --quiet || git commit -m "chore: auto-update wind forecast data"
        git push
