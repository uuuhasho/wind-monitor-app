name: CPC Wind Forecast Pipeline

on:
  schedule:
    # 台灣時間每日 15:00（即 UTC 07:00）自動觸發
    - cron: '0 7 * * *'
  workflow_dispatch:
    # 允許手動觸發

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies (LibreOffice)
      run: |
        sudo apt-get update
        sudo apt-get install -y libreoffice --no-install-recommends

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python-headless requests firebase-admin numpy

    - name: Create Config Files from Secrets
      run: |
        echo '${{ secrets.CONFIG_JSON }}' > config.json
        echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json

    - name: Run Pipeline
      run: |
        python main.py
