<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺中LNG船監控(NV4.7.5)</title>
    <link rel="icon" href="app_icon.png" type="image/png">
    <link rel="apple-touch-icon" href="app_icon.png">

    <meta name="theme-color" content="#4A90E2"/>
    <link rel="manifest" href="manifest.json">
    
    <!-- Apple-specific meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LNG監控">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>


    <style>
        :root {
            --bg-color: #EBF3FC;
            --card-bg: #ffffff;
            --text-main: #555555;
            --text-navy: #0A2540; /* 深藍色標題與速度字型 */
            --text-blue: #10458C; /* 藍色焦點與表頭 */
            --border-light: #E6EEF8; /* 內邊框 */
            --primary-color: #10458C;
            --safe-color: #137333;
            --warning-color: #C5221F;
            --waiting-color: #5F6368;
            --reset-color: #D93025; 
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #EBF3FC 0%, #F5F9FD 100%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(16, 69, 140, 0.06);
            padding: 30px 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }

        h2 { 
            margin-top: 0; 
            margin-bottom: 12px;
            color: var(--text-navy); 
            font-size: 1.5em; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .presentation-link {
            margin-bottom: 24px;
            font-size: 0.95em;
        }
        .presentation-link a {
            text-decoration: none;
            color: var(--text-blue);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .presentation-link a:hover {
            opacity: 0.8;
            color: #0D3A75;
        }
        
        .wind-container {
            display: flex;
            justify-content: center;
            align-items: baseline; 
            margin: 15px 0 5px 0;
            color: var(--text-navy);
        }
        .wind-speed-num { 
            font-size: 4.5em; 
            font-weight: 700; 
            letter-spacing: -2px;
            line-height: 1;
        }
        .wind-speed-unit { 
            font-size: 1.3em; 
            font-weight: 500; 
            margin-left: 6px; 
            color: #6B7A90; 
        }
        
        .time-display { 
            font-size: 0.85em; 
            color: #8C9CAE; 
            margin-bottom: 25px; 
        }

        .dynamic-box {
            margin: 20px 0; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 1.05em;
            transition: all 0.3s ease; 
            display: none;
            box-sizing: border-box;
        }
        
        .status-waiting { 
            background-color: #F1F3F4; 
            color: var(--waiting-color); 
            border: 1px solid #BDC1C6; 
        }
        .status-warning { 
            background-color: #FCE8E6; 
            color: var(--warning-color); 
            border: 1px solid #F28B82; 
        }
        .status-safe {
            background-color: #E6F4EA; 
            color: var(--safe-color); 
            border: 1px solid #81C995;
            animation: breathing 2s infinite ease-in-out;
        }

        @keyframes breathing {
            0% { box-shadow: 0 0 5px rgba(25, 135, 84, 0.2); }
            50% { box-shadow: 0 0 20px rgba(25, 135, 84, 0.6); }
            100% { box-shadow: 0 0 5px rgba(25, 135, 84, 0.2); }
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.9em; margin-bottom: 6px; font-weight: 600; color: var(--text-navy); }
        .input-group input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #D5E1F2; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1em; 
            transition: all 0.2s ease;
            color: var(--text-navy);
            background-color: #FFFFFF;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--text-blue);
            box-shadow: 0 0 0 3px rgba(16, 69, 140, 0.12);
        }
        .input-group input:disabled {
            background-color: #F1F3F4; 
            color: #888888; 
            border-color: #E6EEF8; 
            cursor: not-allowed;
        }
        
        .btn {
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.05em; 
            font-weight: 600;
            cursor: pointer; 
            margin-top: 10px; 
            color: white; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(16, 69, 140, 0.1);
        }
        .btn-start { background-color: var(--primary-color); }
        .btn-start:hover { background-color: #0D3A75; transform: translateY(-1px); }
        .btn-start:active { transform: translateY(0); }
        .btn-reset { background-color: var(--reset-color); } 
        .btn-reset:hover { background-color: #B52218; transform: translateY(-1px); }
        .btn-reset:active { transform: translateY(0); }
        
        #loading { color: #8C9CAE; font-size: 0.9em; margin-top: 15px; margin-bottom: 15px; height: 20px; }

        .pob-records {
            margin-top: 15px;
            padding: 16px;
            background-color: #E6F4EA; 
            border: 1px solid #81C995; 
            border-radius: 12px;
            text-align: left;
            font-size: 0.95em; 
            font-weight: 600;
            color: var(--safe-color); 
            line-height: 1.6;
            display: none;
            box-sizing: border-box;
        }

/* --- 密碼輸入視窗樣式 --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(10, 37, 64, 0.4); 
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: none;
            justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background-color: white; 
            padding: 24px; 
            border-radius: 20px;
            width: 85%; 
            max-width: 320px; 
            text-align: center;
            box-shadow: 0 20px 50px rgba(10, 37, 64, 0.15);
            box-sizing: border-box;
        }
        .modal-content h3 {
            margin-top: 0;
            color: var(--text-navy);
            font-weight: 700;
        }
        .modal-content input {
            width: 100%; 
            padding: 12px; 
            margin: 16px 0; 
            border: 1px solid #D5E1F2;
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1.2em; 
            text-align: center;
            color: var(--text-navy);
            transition: all 0.2s ease;
        }
        .modal-content input:focus {
            outline: none;
            border-color: var(--text-blue);
            box-shadow: 0 0 0 3px rgba(16, 69, 140, 0.12);
        }
        .modal-buttons { display: flex; justify-content: space-between; gap: 10px; }
        .modal-btn {
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            font-size: 0.95em; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s ease;
        }
        .btn-cancel { background-color: #F1F3F4; color: #5F6368; }
        .btn-cancel:hover { background-color: #E8EAED; }
        .btn-confirm { background-color: var(--primary-color); color: white; }
        .btn-confirm:hover { background-color: #0D3A75; }

        /* 🌟 縮小 POB 時間欄位的提示文字字體 */
        #pobTime::placeholder {
            font-size: 0.85em;
            color: #A0B0C4;
        }

        /* --- 船期表樣式 --- */
        .schedule-section {
            margin-top: 15px;
            background: #ffffff;
            border-radius: 18px;
            border: 1px solid var(--border-light);
            padding: 16px;
            text-align: left;
            box-sizing: border-box;
        }
        .schedule-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; border-bottom: 1px solid var(--border-light); padding-bottom: 10px;
        }
        .schedule-header h3 { 
            margin: 0; 
            font-size: 1.15em; 
            color: var(--text-blue); 
            font-weight: 600;
        }
        .cpc-btn {
            width: 32px;
            height: 32px;
            cursor: pointer;
            transition: all 0.2s ease;
            object-fit: contain;
        }
        .cpc-btn:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }
        .cpc-btn:active {
            transform: scale(0.9);
        }
        .schedule-table { width: 100%; border-collapse: collapse; font-size: 0.95em; }
        .schedule-table th, .schedule-table td {
            padding: 12px 6px; 
            border-bottom: 1px solid #EBF1F7; 
            text-align: center;
        }
        .schedule-table th { 
            color: var(--text-blue); 
            font-weight: 600; 
            background-color: #F0F5FD;
        }
        .schedule-table th:first-child {
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }
        .schedule-table th:last-child {
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }
        
        .schedule-table td {
            color: #555555; /* 「日期」、「船名」、「速限」保持深灰字體 */
        }
        
        .schedule-row-safe {
            background-color: #E6F4EA !important; 
            color: var(--safe-color) !important; 
            font-weight: bold;
            animation: row-breathing 2s infinite ease-in-out;
        }
        .schedule-row-safe td {
            color: var(--safe-color) !important;
        }
        .schedule-row-warning { 
            background-color: #FCE8E6 !important; 
            color: var(--warning-color) !important; 
            font-weight: bold; 
        }
        .schedule-row-warning td {
            color: var(--warning-color) !important;
        }
        .schedule-row-waiting { 
            background-color: #F1F3F4 !important; 
            color: var(--waiting-color) !important; 
            font-weight: bold; 
        }
        .schedule-row-waiting td {
            color: var(--waiting-color) !important;
        }

        /* 修正 Apple 設備對於 tr 標籤不支援陰影動畫的問題，改為背景色柔和漸變 */
        @keyframes row-breathing {
            0% { background-color: #E6F4EA; }
            50% { background-color: #D2F0DA; }
            100% { background-color: #E6F4EA; }
        }

        @keyframes pulse-highlight {
            0% { box-shadow: 0 0 0 0 rgba(255, 165, 0, 0.7); }
            50% { box-shadow: 0 0 12px 4px rgba(255, 165, 0, 0.4); }
            100% { box-shadow: 0 0 0 0 rgba(255, 165, 0, 0); }
        }

        /* 讓表格區塊可滾動的樣式 */
        .table-wrapper {
            max-height: 215px; /* 控制最大高度，超過時出現捲軸 */
            overflow-y: auto;
        }
        .table-wrapper::-webkit-scrollbar { width: 6px; }
        .table-wrapper::-webkit-scrollbar-track { background: transparent; }
        .table-wrapper::-webkit-scrollbar-thumb { background: #D5E1F2; border-radius: 4px; }
        
        /* 固定表格標題列 */
        .schedule-table th {
            position: sticky;
            top: 0;
            z-index: 1;
        }

        #soundToggle:hover {
            transform: scale(1.15);
        }

        /* 🌟 即時風速數字點擊效果 */
        .wind-speed-num {
            cursor: pointer;
            transition: transform 0.2s ease, text-shadow 0.2s ease;
        }
        .wind-speed-num:hover {
            transform: scale(1.05);
            text-shadow: 0 0 12px rgba(16, 69, 140, 0.2);
        }

        /* 🌟 天氣預報彈窗特定樣式 */
        .forecast-modal-content {
            background-color: #0d1117; 
            color: #f0f6fc;
            border: 1px solid rgba(56, 139, 253, 0.25);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
            padding: 24px;
            border-radius: 24px;
            width: 95%;
            max-width: 600px;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .forecast-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(48, 54, 61, 0.8);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .forecast-header h3 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
        }

        .forecast-close {
            font-size: 1.5rem;
            color: #8b949e;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }
        .forecast-close:hover {
            color: #ffffff;
        }

        .forecast-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .forecast-select-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .forecast-select-group label {
            font-size: 0.9rem;
            color: #8b949e;
            font-weight: 500;
        }

        .forecast-select {
            padding: 8px 12px;
            border: 1px solid #30363d;
            border-radius: 8px;
            background-color: #161b22;
            color: #f0f6fc;
            outline: none;
            font-size: 0.9em;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .forecast-select:focus {
            border-color: #58a6ff;
        }

        /* 🌟 黃色手動更新按鈕 */
        .btn-update-forecast {
            background-color: #f1c40f !important;
            color: #1a1a1a !important;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(241, 196, 15, 0.15);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-update-forecast:hover {
            background-color: #f39c12 !important;
            box-shadow: 0 6px 16px rgba(241, 196, 15, 0.3);
            transform: translateY(-1px);
        }
        .btn-update-forecast:active {
            transform: translateY(0);
        }
        .btn-update-forecast:disabled {
            background-color: #30363d !important;
            color: #8b949e !important;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* 🌟 ECharts 容器樣式 */
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 360px;
            background-color: rgba(22, 27, 34, 0.4);
            border: 1px solid rgba(48, 54, 61, 0.6);
            border-radius: 12px;
            padding: 12px;
            box-sizing: border-box;
        }

        /* Tooltip 覆寫樣式 */
        .custom-tooltip {
            padding: 10px 14px;
            background: rgba(22, 27, 34, 0.35) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(88, 166, 255, 0.3) !important;
            border-radius: 8px !important;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4) !important;
            color: #f0f6fc !important;
            font-family: system-ui, -apple-system, sans-serif !important;
            backdrop-filter: blur(4px);
        }
        .tooltip-time {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 6px;
            border-bottom: 1px solid rgba(240, 246, 252, 0.1);
            padding-bottom: 4px;
            color: #58a6ff;
        }
        .tooltip-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            font-size: 0.8rem;
            margin-bottom: 4px;
        }
        .tooltip-row:last-child {
            margin-bottom: 0;
        }
        .tooltip-val {
            font-weight: 600;
        }
        .val-cpc {
            color: #e2e8f0;
        }
        .val-om {
            color: #8b949e;
        }
    </style>

</head>
<body>

<div class="container">
    <h2>🚢 臺中LNG船監控</h2>
    <div class="presentation-link">
        <a href="presentation/index.html">📖 介紹說明</a>
    </div>
    
    <div class="wind-container">
        <div class="wind-speed-num" id="windSpeed">--</div>
        <div class="wind-speed-unit">m/s</div>
    </div>
    
    <div class="time-display" id="dataTime">系統連線中...</div>

    <!-- POB 紀錄板往上移 -->
    <div id="pobList" class="pob-records" style="margin-bottom: 15px;"></div>

    <div id="dynamicBox" class="dynamic-box"></div>

    <!-- 船期表區塊 -->
    <div class="schedule-section">
        <div class="schedule-header">
            <h3>船期表</h3>
            <span id="soundToggle" onclick="toggleSound()" style="cursor: pointer; font-size: 1.4em; transition: transform 0.2s; user-select: none; display: none;" title="提醒音效">🔕</span>
            <img src="fast-forward.png" class="cpc-btn" onclick="openManualModal()" alt="設定" title="手動設定">
        </div>
        <div class="table-wrapper">
            <table class="schedule-table">
                <thead>
                    <tr><th>日期</th><th>船名</th><th>速限</th></tr>
                </thead>
                <tbody id="scheduleBody">
                    <tr><td colspan="3" style="text-align:center; color:#888888;">載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="loading"></div>
</div>

<!-- 手動監控設定 Modal -->
<div id="manualModal" class="modal-overlay">
    <div class="modal-content" style="max-width: 320px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin: 0; color: #333;">⚙️ 手動監控設定</h3>
        </div>
        <div class="input-group"><label for="shipName">船名</label><input type="text" id="shipName" placeholder="例如: Cobia"></div>
        <div class="input-group"><label for="limitSpeed">限制風速 (m/s)</label><input type="number" id="limitSpeed" step="0.1" placeholder="例如: 12.0"></div>
        <div class="input-group" id="pobTimeGroup" style="display: none; margin-top: 10px; border-top: 1px dashed #ccc; padding-top: 10px;"><label for="pobTime" style="color: var(--primary-color);">🕒 (非必要)手動輸入 POB 時間</label><input type="text" id="pobTime" placeholder="如14:56" maxlength="5" style="text-align: center; font-size: 1.1em; letter-spacing: 1px;" oninput="formatPobTime(this)"></div>
        <button class="btn btn-start" id="startBtn" onclick="setMode('start')">▶ 開始監控</button>
        <button class="btn btn-reset" id="resetBtn" onclick="setMode('reset')" style="display: none;">⏹ 結束監控</button>
        <button class="btn btn-cancel" onclick="closeManualModal()" style="width: 100%; margin-top: 10px; background-color: #eee;">關閉</button>
    </div>
</div>

<div id="pwdModal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-top: 0; color: #333;">🔐 安全驗證</h3>
        <p style="font-size: 0.9em; color: #666; margin-bottom: 5px;">請輸入密碼：</p>
        <input type="password" id="modalPwdInput" placeholder="輸入密碼">
        <div class="modal-buttons">
            <button class="modal-btn btn-cancel" onclick="closePwdModal(false)">取消</button>
            <button class="modal-btn btn-confirm" onclick="closePwdModal(true)">確認</button>
        </div>
    </div>
</div>

<!-- 🌟 天氣預測儀表板 Modal -->
<div id="forecastModal" class="modal-overlay" style="display: none; align-items: center; justify-content: center; z-index: 1001;">
    <div class="forecast-modal-content">
        <div class="forecast-header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <h3 style="margin: 0;">天氣預測儀表板</h3>
                <button id="forecastUpdateBtn" class="btn-update-forecast" onclick="triggerForecastUpdate()" style="margin: 0; padding: 4px 10px; font-size: 0.75rem;">
                    <span>🔄 手動更新</span>
                </button>
            </div>
            <span class="forecast-close" onclick="closeForecastModal()">&times;</span>
        </div>
        
        <div class="forecast-controls">
            <div class="forecast-select-group" style="width: 100%;">
                <select id="shipForecastSelect" class="forecast-select" style="width: 100%;" onchange="onForecastShipChange()"></select>
            </div>
        </div>
        
        <div class="chart-wrapper" style="position: relative;">
            <!-- 自訂無圓點圖例 -->
            <div style="position: absolute; top: 0px; right: 4%; display: flex; gap: 15px; font-size: 11px; color: #8b949e; pointer-events: none; z-index: 10;">
                <div style="display: flex; align-items: center; gap: 5px; color: #ff7b72;">
                    <svg width="20" height="4" xmlns="http://www.w3.org/2000/svg"><line x1="0" y1="2" x2="20" y2="2" stroke="#ff7b72" stroke-width="2.2" /></svg>
                    <span style="font-weight: bold;">空軍預測</span>
                </div>
                <div style="display: flex; align-items: center; gap: 5px; color: #58a6ff;">
                    <svg width="20" height="4" xmlns="http://www.w3.org/2000/svg"><line x1="0" y1="2" x2="20" y2="2" stroke="#58a6ff" stroke-width="2" stroke-dasharray="6,4" /></svg>
                    <span style="font-weight: bold;">ECMWF陣風</span>
                </div>
            </div>
            
            <div id="forecastChart" style="width: 100%; height: 100%;"></div>
            <span id="forecastStatus" style="position: absolute; right: 4%; bottom: 35px; color: #58a6ff; font-size: 0.72rem; font-weight: bold; pointer-events: none; z-index: 10;">系統就緒</span>
        </div>
        
        <div style="margin-top: 15px; font-size: 0.72rem; color: #8b949e; border-top: 1px solid rgba(48,54,61,0.5); padding-top: 10px; text-align: center; width: 100%;">
            <span>© 本預報僅用於判斷LNG船進出港 | 橫軸為台灣時間</span>
        </div>
    </div>
</div>

<script>

    // ==========================================
    // ⚠️ 必填區：請更換為您的專屬網址
    // ==========================================
    const FIXED_GAS_API_URL = "https://script.google.com/macros/s/AKfycbwSs0kDZbl6Whua7UKmUMk1rlCuFgJHFhSIUA0nVTVmLujhrlbVXdiem4rN5WJIEg9brA/exec?";
    const FIREBASE_DB_URL = "https://milkshake-monitor-default-rtdb.asia-southeast1.firebasedatabase.app/"; 
    // ==========================================

    // 初始化 Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp({ databaseURL: FIREBASE_DB_URL });
    }
    const db = firebase.database();

    // 🌟 初始化第二個 Firebase App 用於 Cloud Firestore (真實專案名稱為 milkshake-monitor)
    let firestoreDb = null;
    try {
        const forecastApp = firebase.initializeApp({ projectId: "milkshake-monitor" }, "forecastApp");
        firestoreDb = firebase.firestore(forecastApp);
    } catch (err) {
        console.error("Firestore 專屬 App 初始化失敗，嘗試回退至預設 App:", err);
        try {
            firestoreDb = firebase.firestore();
        } catch (e) {
            console.error("Firestore 初始化完全失敗，請確認 Firebase SDK 是否正確載入。:", e);
        }
    }


    let currentAppData = {};
    let scheduleDataList = [];
    let currentStatus = "stopped"; // 🌟 新增：全域狀態追蹤 ("stopped", "safe", "warning", "waiting")

    // --- 音效提醒變數 ---
    let isSoundEnabled = false; // 預設關閉音效
    // 🌟 已更換為本機及 GitHub 專案中的 MP3 通知音效 (Option C)
    const notificationSound = new Audio('notification_option_C.mp3');

    // 🌟 獲取台灣時間 (Asia/Taipei) 的日期與時間物件，解決跨時區與日夜切換 Bug
    function getTaiwanDateTime() {
        const now = new Date();
        try {
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: 'Asia/Taipei',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
            const parts = formatter.formatToParts(now);
            let year, month, day, hour, minute;
            for (const part of parts) {
                if (part.type === 'year') year = part.value;
                if (part.type === 'month') month = part.value;
                if (part.type === 'day') day = part.value;
                if (part.type === 'hour') hour = part.value;
                if (part.type === 'minute') minute = part.value;
            }
            if (hour === '24') hour = '00';
            return {
                dateStr: `${year}-${month}-${day}`,
                timeStr: `${hour}:${minute}`
            };
        } catch (e) {
            // 發生異常時的備用機制（使用本機系統時間）
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            return {
                dateStr: `${yyyy}-${mm}-${dd}`,
                timeStr: `${hh}:${min}`
            };
        }
    }

    function getCurrentDateStr() {
        return getTaiwanDateTime().dateStr;
    }

    function getCurrentTimeHHMM() {
        return getTaiwanDateTime().timeStr;
    }

    // 當 Firebase 資料變更時，更新動態判定框
    function updateDynamicBox(data) {
        currentAppData = data;
        const box = document.getElementById('dynamicBox');
        let currentStatusClass = "";

        if (!data || data.app_mode !== 'start') {
            box.style.display = 'none';
            currentStatus = "stopped"; // 狀態設為停止監控
        } else {
            const shipName = data.ship_name || "未知船隻";
            const limitSpeed = parseFloat(data.limit_speed) || 0;
            const currentSpeed = parseFloat(data.current_wind) || 0;
            const seasonTime = data.season_time || "--:--"; 
            const currentTime = getCurrentTimeHHMM();
            
            box.className = "dynamic-box"; 
            box.style.display = "block";

            if (seasonTime === "--:--" || currentTime < seasonTime) {
                currentStatusClass = 'schedule-row-waiting';
                box.classList.add('status-waiting');
                box.innerHTML = `<strong>${shipName} 等待進港</strong><br><span style="font-size:0.8em;">(表定時間 ${seasonTime} 開始判定)</span>`;
                currentStatus = "waiting";
            } else if (currentSpeed > limitSpeed) {
                currentStatusClass = 'schedule-row-warning';
                box.classList.add('status-warning');
                box.innerHTML = `<strong>${shipName} 無法進港</strong><br><span style="font-size:0.8em;">(目前 ${currentSpeed} > 限制 ${limitSpeed})</span>`;
                currentStatus = "warning";
            } else {
                currentStatusClass = 'schedule-row-safe';
                box.classList.add('status-safe');
                box.innerHTML = `<strong style="font-size:1.3em;">${shipName} 可進港</strong>`;
                currentStatus = "safe";
            }
        }
        updateTableHighlight(currentStatusClass);
        syncAudioState(); // 🌟 同步音效與喇叭圖示狀態
    }

    // 🌟 狀態同步核心：處理鈴鐺顯示以及音效播放狀態
    function syncAudioState() {
        const isMonitoring = currentAppData && currentAppData.app_mode === 'start';
        const soundToggle = document.getElementById('soundToggle');
        
        // 1. 鈴鐺 icon 的顯示/隱藏與內容控制
        if (soundToggle) {
            // 有船監控時才顯示，否則隱藏
            soundToggle.style.display = isMonitoring ? 'inline-block' : 'none';
            // 根據開啟/關閉狀態顯示不同的鈴鐺圖示 (🔔=開啟, 🔕=關閉)
            soundToggle.innerText = isSoundEnabled ? '🔔' : '🔕';
        }

        // 2. 音效播放邏輯
        if (isMonitoring && isSoundEnabled && currentStatus === 'safe') {
            // 進港條件符合，且開啟音效時，持續循環播放音效
            if (notificationSound.paused) {
                notificationSound.loop = true;
                notificationSound.play().catch(err => console.log("播放音效失敗:", err));
            }
        } else {
            // 結束監控、非進港狀態、或是使用者手動關閉音效時，立即停止播放並重置
            if (!notificationSound.paused) {
                notificationSound.pause();
                notificationSound.currentTime = 0;
            }
        }
    }

    // 🌟 更新表格特定列的亮燈特效（加入安全防護與不分大小寫/去空白比對）
    function updateTableHighlight(statusClass) {
        const rows = document.querySelectorAll('#scheduleBody tr[data-shipname]');
        rows.forEach(row => {
            row.classList.remove('schedule-row-safe', 'schedule-row-warning', 'schedule-row-waiting');
            const rowShipName = row.getAttribute('data-shipname');
            
            // 安全防範：確保 currentAppData 存在且有 app_mode
            const hasActiveStart = currentAppData && currentAppData.app_mode === 'start';
            if (hasActiveStart && rowShipName && currentAppData.ship_name && statusClass) {
                // 去除前後空白並統一轉為小寫，以避免人工輸入大小寫或空格不一致導致表格不亮燈的 Bug
                if (rowShipName.trim().toLowerCase() === currentAppData.ship_name.trim().toLowerCase()) {
                    row.classList.add(statusClass);
                }
            }
        });
    }

    // 🌟 將陣列渲染為表格
    function renderScheduleTable() {
        const tbody = document.getElementById('scheduleBody');
        if (!scheduleDataList || scheduleDataList.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#888;">目前無未來船期資料</td></tr>';
            return;
        }
        let html = '';
        scheduleDataList.forEach(item => {
            html += `<tr data-shipname="${item.ship_name}">
                        <td>${item.d}</td>
                        <td>${item.ship_name}</td>
                        <td>${item.limit_speed}</td>
                     </tr>`;
        });
        tbody.innerHTML = html;
        updateDynamicBox(currentAppData); // 重繪表格燈號避免被洗掉
    }

    // 🌟 備用機制：若 Firebase 讀取失敗，直接向 GAS API 請求船期資料
    async function fetchScheduleFromGas() {
        try {
            const response = await fetch(FIXED_GAS_API_URL + "action=display");
            const data = await response.json();
            if (data && data.schedule_list) {
                scheduleDataList = data.schedule_list;
                renderScheduleTable();
            }
        } catch (error) {
            console.error("從 GAS 獲取船期表失敗:", error);
            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#dc3545;">載入失敗，請檢查網路連線</td></tr>';
        }
    }

    function openManualModal() { document.getElementById('manualModal').style.display = 'flex'; }
    function closeManualModal() { document.getElementById('manualModal').style.display = 'none'; }

    // 🌟 處理音效開關邏輯
    function toggleSound() {
        isSoundEnabled = !isSoundEnabled;
        
        // 點擊當下無聲播放一次，解鎖 iOS / Chrome 對於瀏覽器自動播放的限制
        if (isSoundEnabled) {
            notificationSound.volume = 0;
            notificationSound.play().then(() => {
                notificationSound.pause();
                notificationSound.currentTime = 0;
                notificationSound.volume = 1;
                syncAudioState(); // 解鎖成功後立即同步狀態
            }).catch(e => {
                console.log("解鎖音效權限失敗:", e);
                syncAudioState();
            });
        } else {
            syncAudioState(); // 關閉時直接停止播放
        }
    }

    // 🌟 動態 POB 監聽器變數（用於解決跨日 POB 看板不更新之 Bug）
    let currentListenerDateStr = "";
    let dailyRecordsRef = null;

    // 🌟 動態訂閱 POB 記錄 (當日期變更時，自動切換至新一天的節點)
    function listenToDailyRecords() {
        const dateStr = getCurrentDateStr();
        if (dateStr === currentListenerDateStr) return; // 日期未變，不重複訂閱
        
        // 若已有舊訂閱，先將其解除 (避免記憶體洩漏與重複觸發)
        if (dailyRecordsRef) {
            dailyRecordsRef.off();
        }
        
        currentListenerDateStr = dateStr;
        dailyRecordsRef = db.ref('daily_records/' + dateStr);
        
        dailyRecordsRef.on('value', (snapshot) => {
            const records = snapshot.val();
            const pobList = document.getElementById('pobList');
            let html = "";

            if (records) {
                // 遍歷當日所有卡片，取出 pob_info
                Object.values(records).forEach(card => {
                    if (card.pob_info && card.pob_info.formatted_msg) {
                        html += `<div style="margin-bottom: 8px;">• ${card.pob_info.formatted_msg}</div>`;
                    }
                });
            }

            if (html !== "") {
                pobList.innerHTML = html;
                pobList.style.display = "block";
            } else {
                pobList.style.display = "none";
            }
        });
    }

    // 啟動 Firebase 即時監聽
    function startFirebaseListeners() {
        // 1. 監聽【系統狀態與即時風速】(毫秒級更新)
        db.ref('active_status').on('value', (snapshot) => {
            // 🌟 每次狀態更新時檢查日期是否跨日，確保動態切換 POB 監聽日節點
            listenToDailyRecords();

            const data = snapshot.val() || {};
            
            // 更新風速與時間
            document.getElementById('windSpeed').innerText = data.current_wind !== undefined ? data.current_wind : "--";
            document.getElementById('dataTime').innerText = "最後更新: " + (data.last_update ? data.last_update : "無資料");
            
            const shipInput = document.getElementById('shipName');
            const speedInput = document.getElementById('limitSpeed');

            // 更新 UI 狀態 (避免幽靈資料)
            if (data.app_mode === 'start') {
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('resetBtn').style.display = 'block';
                document.getElementById('pobTimeGroup').style.display = 'block';
                shipInput.disabled = true;
                speedInput.disabled = true;
                
                if (document.activeElement !== shipInput) shipInput.value = data.ship_name || "";
                if (document.activeElement !== speedInput) speedInput.value = data.limit_speed || "";
            } else {
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('resetBtn').style.display = 'none';
                document.getElementById('pobTimeGroup').style.display = 'none';
                shipInput.disabled = false;
                speedInput.disabled = false;
                
                if (document.activeElement !== shipInput) shipInput.value = "";
                if (document.activeElement !== speedInput) speedInput.value = "";
                document.getElementById('pobTime').value = ""; // 清空
            }

            // 更新呼吸燈
            updateDynamicBox(data);

            // 🌟 同步天氣預報手動更新按鈕狀態與即時重新加載
            const updateBtn = document.getElementById('forecastUpdateBtn');
            if (updateBtn) {
                if (data.forecast_updating === true) {
                    updateBtn.disabled = true;
                    updateBtn.innerHTML = `<span>⏳ 更新中...</span>`;
                } else {
                    const wasUpdating = updateBtn.disabled;
                    updateBtn.disabled = false;
                    
                    // 🌟 若自動更新超時失敗，提示使用者手動更新
                    if (data.forecast_auto_failed === true) {
                        updateBtn.innerHTML = `<span>⚠️ 請手動更新</span>`;
                        updateBtn.style.animation = 'pulse-highlight 1.5s ease-in-out 3';
                    } else {
                        updateBtn.innerHTML = `<span>🔄 手動更新</span>`;
                        updateBtn.style.animation = '';
                    }
                    
                    // 若是剛更新完畢，自動重新抓取 Firestore 最新氣象預報
                    if (wasUpdating && typeof loadForecastData === 'function') {
                        loadForecastData();
                    }
                }
            }
        });


        // 2. 監聽【未來船期表】(實時同步，秒速渲染)
        db.ref('schedule_list').on('value', (snapshot) => {
            scheduleDataList = snapshot.val() || [];
            renderScheduleTable();
        }, (error) => {
            console.warn("Firebase schedule_list 讀取受限，嘗試從 GAS 備用接口獲取...", error);
            fetchScheduleFromGas();
        });
    }

    // 🌟 優化：移除 GAS 初始化等待，網頁載入直接啟動 Firebase 即時監聽
    function initSystem() {
        document.getElementById('loading').innerText = "連線中...";
        startFirebaseListeners();
        
        // 🌟 點擊即時風速數字，開啟天氣預報視窗
        document.getElementById('windSpeed').addEventListener('click', openForecastModal);
        
        // 🌟 UX 優化：增加鍵盤事件，讓使用者在密碼視窗輸入完畢後可按 Enter 鍵直接確認
        document.getElementById('modalPwdInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                closePwdModal(true);
            }
        });


        setTimeout(() => {
            document.getElementById('loading').innerText = "";
        }, 800); // 短暫顯示後清除
    }

   // --- 密碼視窗控制邏輯 ---
    let pwdResolve = null; // 用來等待使用者按鈕的變數

    function getPasswordFromModal() {
        return new Promise((resolve) => {
            const modal = document.getElementById('pwdModal');
            const input = document.getElementById('modalPwdInput');
            input.value = ''; // 每次打開先清空密碼
            modal.style.display = 'flex'; // 顯示視窗
            input.focus(); // 自動對焦輸入框
            pwdResolve = resolve; // 把決定權交給按鈕
        });
    }

   function closePwdModal(isConfirm) {
        const modal = document.getElementById('pwdModal');
        const input = document.getElementById('modalPwdInput');
        modal.style.display = 'none'; 
        
        if (pwdResolve) {
            pwdResolve(isConfirm ? input.value : null); 
            pwdResolve = null;
        }
    }

    // 🌟 自動格式化 POB 時間：輸入 1423 自動轉 14:23
    function formatPobTime(input) {
        let val = input.value.replace(/[^\d]/g, ''); // 只保留數字
        if (val.length >= 3) {
            input.value = val.slice(0, 2) + ':' + val.slice(2, 4);
        } else {
            input.value = val;
        }
    }

    // --- 按鈕控制 (雙效合一 + 星號密碼視窗 + 邏輯優化版) ---
    async function setMode(mode) {
        // 🌟 優化：如果是開始監控，先檢查有沒有填寫資料，沒填就不往下走
        let shipName = "";
        let limitSpeed = "";
        let pobTime = "";

        if (mode === 'start') {
            // 🌟 修正 Bug：手動輸入船名時，自動去前後空白 (Trim)，防比對失敗
            shipName = document.getElementById('shipName').value.trim();
            limitSpeed = document.getElementById('limitSpeed').value.trim();
            if(!shipName || !limitSpeed) {
                alert("❌ 請先填寫船名與限制風速！");
                return; // 提早阻斷，不用問密碼了
            }
        }

        if (mode === 'reset') {
            pobTime = document.getElementById('pobTime').value;
            if (pobTime) {
                const parts = pobTime.split(':');
                if (parts.length !== 2 || parts[0].length !== 2 || parts[1].length !== 2) {
                    alert("❌ POB 時間格式錯誤，請輸入 4 位數字 (如 1423)");
                    return;
                }
                
                // 🌟 修正 Bug：顯式使用 10 進位 (Radix 10) 解析，防止 "08", "09" 被誤判為 8 進位而產生錯誤
                const hour = parseInt(parts[0], 10);
                const min = parseInt(parts[1], 10);

                if (hour < 4 || hour > 17 || min < 0 || min > 59) {
                    alert("❌ POB 時間超出範圍：\n小時須為 04~17\n分鐘須為 00~59");
                    return;
                }
            }
        }

        // 1. 呼叫我們自訂的密碼視窗，並等待使用者輸入
        const password = await getPasswordFromModal();
        if (password === null) return; 

        // 🌟 優化：若密碼為空，提早阻斷，不發送無效的 API 請求
        if (password.trim() === "") {
            alert("❌ 密碼不能為空！");
            return;
        }

        // 2. 如果是要結束，先在網頁端確認
        if (mode === 'reset' && !confirm("⚠️ 確定要手動結束當前監控嗎？" + (pobTime ? `\n(將同步紀錄 ${pobTime} POB 並發送推播)` : ""))) {
            return;
        }

        document.getElementById('loading').innerText = "驗證與傳送指令中...";

        try {
            // 3. 將指令與密碼打包送給 GAS
            let url = FIXED_GAS_API_URL + "action=set_mode&mode=" + mode + "&pwd=" + encodeURIComponent(password);
            
            if (mode === 'start') {
                url += "&ship_name=" + encodeURIComponent(shipName) + "&limit_speed=" + encodeURIComponent(limitSpeed);
            } else if (mode === 'reset' && pobTime) {
                url += "&pob_time=" + encodeURIComponent(pobTime);
            }

            // 4. 等待結果
            const response = await fetch(url);
            const data = await response.json();

            // 5. 檢查後端回傳的狀態
            if (data.status === "error") {
                alert(data.msg); 
            } else if (mode === 'reset' && !pobTime && data.has_tomorrow_ship === false) {
                // 🌟 修正：手動結束、未輸入 POB (代表未進港)、且明天無船，才彈窗詢問預約
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                const confirmMsg = `明日是否繼續監控 [${data.last_ship_name}]？`;
                
                if (confirm(confirmMsg)) {
                    document.getElementById('loading').innerText = "正在為您預約明日監控...";
                    const reserveUrl = FIXED_GAS_API_URL + "action=reserve_next&ship_name=" + encodeURIComponent(data.last_ship_name) + 
                                       "&limit_speed=" + encodeURIComponent(data.last_limit_speed) + "&pwd=" + encodeURIComponent(password);
                    
                    const resRes = await fetch(reserveUrl);
                    const resData = await resRes.json();
                    
                    if (resData.status === "success") {
                        alert("✅ 預約成功！明日 04:00 將自動啟動。");
                    } else {
                        alert("❌ 預約失敗：" + resData.msg);
                    }
                }
                closeManualModal();
            } else {
                closeManualModal();
            }
            
            document.getElementById('loading').innerText = "";
            
        } catch (error) {
            document.getElementById('loading').innerText = "設定失敗，請檢查網路連線";
        }
    }

    // =========================================================================
    // 🌟 天氣預測儀表板 控制邏輯 (方案 A - Modal)
    // =========================================================================
    let forecastChartInstance = null;
    let lastFetchedForecastData = null; // 快取最後一次載入的氣象數據

    function openForecastModal() {
        document.getElementById('forecastModal').style.display = 'flex';
        populateShipForecastSelect();
        initForecastChart();
        if (lastFetchedForecastData) {
            renderForecastChart(lastFetchedForecastData);
        }
        loadForecastData();
    }

    function closeForecastModal() {
        document.getElementById('forecastModal').style.display = 'none';
    }

    // 船期下拉選單填充
    function populateShipForecastSelect() {
        const select = document.getElementById('shipForecastSelect');
        select.innerHTML = ''; // 清空

        if (!scheduleDataList || scheduleDataList.length === 0) {
            const opt = document.createElement('option');
            opt.value = "15.0";
            opt.textContent = "無船期 (預設速限 15.0)";
            select.appendChild(opt);
            return;
        }

        scheduleDataList.forEach(ship => {
            const opt = document.createElement('option');
            // 綁定限制速限作為 value
            opt.value = ship.limit_speed;
            // 顯示格式如 6/9 LNG Endeavour
            opt.textContent = `${ship.d} ${ship.ship_name}`;
            select.appendChild(opt);
        });
    }

    function onForecastShipChange() {
        // 切換船期時重新更新圖表的 ECharts option，讓 tooltip 能即時反映新選中船的限速
        if (forecastChartInstance && lastFetchedForecastData) {
            renderForecastChart(lastFetchedForecastData);
        }
    }

    // 初始化 ECharts 圖表
    function initForecastChart() {
        const chartDom = document.getElementById('forecastChart');
        if (!forecastChartInstance) {
            forecastChartInstance = echarts.init(chartDom, 'dark', { renderer: 'canvas' });
            window.addEventListener('resize', () => {
                if (forecastChartInstance) forecastChartInstance.resize();
            });
        }
    }

    // 從 Cloud Firestore 載入數據
    async function loadForecastData() {
        const statusEl = document.getElementById('forecastStatus');
        statusEl.innerText = "正在載入數據...";
        statusEl.style.color = "#58a6ff";

        if (!firestoreDb) {
            statusEl.innerText = "資料庫未初始化";
            statusEl.style.color = "#ff7b72";
            return;
        }

        try {
            // 獲取最新 200 筆資料，依 timestamp 降序排列 (確保拿到最新預報而非舊歷史)，並在前端反轉
            const snapshot = await firestoreDb.collection("wind_forecasts")
                .orderBy("timestamp", "desc")
                .limit(200)
                .get();

            if (snapshot.empty) {
                statusEl.innerText = "資料庫無預報數據";
                statusEl.style.color = "#ff7b72";
                return;
            }

            const data = [];
            let latestUpdatedAt = null; // 追蹤 Firestore 中最新的 updatedAt 時間
            snapshot.forEach(doc => {
                const docData = doc.data();
                const dateObj = docData.timestamp.toDate();
                data.push({
                    timestamp: dateObj.toISOString(),
                    cpc_wind_speed: docData.cpc_wind,
                    open_meteo_wind_speed: docData.open_meteo_wind
                });
                // 取得所有文件中最新的 updatedAt 時間戳記
                if (docData.updatedAt) {
                    const updAt = docData.updatedAt.toDate();
                    if (!latestUpdatedAt || updAt > latestUpdatedAt) {
                        latestUpdatedAt = updAt;
                    }
                }
            });

            // 反轉回時間升序排列，以供折線圖由左至右正常顯示
            data.reverse();

            lastFetchedForecastData = data;
            renderForecastChart(data);
            
            // 🌟 修正：使用 Firestore 中真實的 updatedAt 時間，而非瀏覽器本地日期
            if (data.length > 0) {
                if (latestUpdatedAt) {
                    // 強制轉換為台灣時間顯示
                    const twTime = new Date(latestUpdatedAt.getTime() + 8 * 60 * 60 * 1000);
                    const m = twTime.getUTCMonth() + 1;
                    const d = twTime.getUTCDate();
                    const hh = String(twTime.getUTCHours()).padStart(2, '0');
                    const mm = String(twTime.getUTCMinutes()).padStart(2, '0');
                    statusEl.innerText = `${m}/${d} ${hh}:${mm} 數據已更新`;
                } else {
                    statusEl.innerText = "數據已載入 (無更新時間)";
                }
                statusEl.style.color = "#58a6ff";
            }
        } catch (err) {
            console.error("Firestore 載入預估數據失敗:", err);
            statusEl.innerText = "載入失敗，請檢查網路連線";
            statusEl.style.color = "#ff7b72";
        }
    }

    // 渲染 ECharts 雙曲線圖表
    function renderForecastChart(data) {
        if (!forecastChartInstance) return;

        // 確保圖表正確調整大小以防範 Modal 初始化尺寸問題
        forecastChartInstance.resize();

        // 格式化 X 軸時間顯示為 M/D HH:00 (強制轉換為台灣時間)
        const timeData = data.map(item => {
            const date = new Date(item.timestamp);
            // 加上 8 小時毫秒數，然後使用 UTC 方法取得台灣時間，避免瀏覽器時區差異
            const twDate = new Date(date.getTime() + 8 * 60 * 60 * 1000);
            const mm = String(twDate.getUTCMonth() + 1);
            const dd = String(twDate.getUTCDate());
            const hh = String(twDate.getUTCHours()).padStart(2, '0');
            return `${mm}/${dd} ${hh}:00`;
        });

        const cpcData = data.map(item => item.cpc_wind_speed);
        const omData = data.map(item => item.open_meteo_wind_speed);

        const option = {
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                confine: true,
                axisPointer: { type: 'line', lineStyle: { color: '#30363d', type: 'dashed' } },
                backgroundColor: 'rgba(22, 27, 34, 0.75)', // 半透明背景
                extraCssText: 'backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-radius: 8px;', // 毛玻璃效果
                className: 'custom-tooltip',
                borderWidth: 0,
                shadowBlur: 0,
                formatter: function (params) {
                    const selectEl = document.getElementById('shipForecastSelect');
                    if (!selectEl || selectEl.options.length === 0) return '';
                    
                    const selectedText = selectEl.options[selectEl.selectedIndex].text;
                    // 格式如 "6/9 LNG Endeavour"，提取船名
                    const shipName = selectedText.includes(' ') ? selectedText.split(' ').slice(1).join(' ') : selectedText;
                    const limitSpeed = parseFloat(selectEl.value); // 取得限制速限

                    const time = params[0].name;
                    let cpcVal = null;
                    let ecmwfVal = null;

                    params.forEach(param => {
                        if (param.seriesName === '空軍預測' && param.value != null) cpcVal = param.value;
                        if (param.seriesName === 'ECMWF陣風' && param.value != null) ecmwfVal = param.value;
                    });

                    // 💡 安全判定：若空軍預測 < 該船限速，顯示綠字"可進港"，否則紅字"無法進港"
                    let statusHtml = '';
                    if (cpcVal !== null) {
                        const isSafe = cpcVal < limitSpeed;
                        statusHtml = isSafe 
                            ? `<span style="color:#2ecc71; font-weight:bold;">(可進港)</span>`
                            : `<span style="color:#e74c3c; font-weight:bold;">(無法進港)</span>`;
                    } else {
                        statusHtml = `<span style="color:#8b949e; font-weight:bold;">(無預測資料)</span>`;
                    }

                    return `
                        <div class="tooltip-time">${time}</div>
                        <div style="font-weight:bold; margin-bottom:8px;">${shipName} ${statusHtml}</div>
                        <div class="tooltip-row">
                            <span>空軍預測:</span>
                            <span class="tooltip-val" style="color:#ffffff;">${cpcVal !== null ? cpcVal.toFixed(2) + ' m/s' : '無資料'}</span>
                        </div>
                        <div class="tooltip-row">
                            <span>ECMWF陣風:</span>
                            <span class="tooltip-val" style="color:#ffffff;">${ecmwfVal !== null ? ecmwfVal.toFixed(2) + ' m/s' : '無資料'}</span>
                        </div>
                    `;
                }
            },
            legend: {
                show: false
            },
            grid: {
                left: '4%',
                right: '4%',
                bottom: '18%',
                top: '12%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: timeData,
                axisLine: { lineStyle: { color: '#30363d' } },
                axisLabel: { color: '#8b949e', fontSize: 10 },
                splitLine: { show: true, lineStyle: { color: '#161b22', type: 'dashed' } }
            },
            yAxis: {
                type: 'value',
                name: '',
                nameTextStyle: { color: '#8b949e', fontSize: 10 },
                axisLabel: { color: '#8b949e', fontSize: 10 },
                splitLine: { show: true, lineStyle: { color: '#21262d' } }
            },
            dataZoom: [
                {
                    type: 'slider', // 在圖表下方顯示一個實體滑動條，方便精準拖移
                    showDetail: false,
                    showDataShadow: false,
                    zoomLock: true, // 固定寬度，不允許縮放
                    dataBackground: { lineStyle: { opacity: 0 }, areaStyle: { opacity: 0 } },
                    selectedDataBackground: { lineStyle: { opacity: 0 }, areaStyle: { opacity: 0 } },
                    orient: 'horizontal',
                    bottom: '0%',
                    height: 16,
                    start: 0,
                    end: 35,
                    textStyle: { color: '#8b949e', fontSize: 9 },
                    borderColor: 'transparent', // 隱藏外框
                    backgroundColor: 'transparent', // 隱藏底色
                    fillerColor: 'rgba(56, 139, 253, 0.15)',
                    handleSize: 0,
                    handleIcon: 'none',
                    handleStyle: {
                        color: 'transparent'
                    }
                }
            ],
            series: [
                {
                    name: '空軍預測',
                    type: 'line',
                    data: cpcData,
                    smooth: true,
                    connectNulls: true,
                    showSymbol: false,
                    lineStyle: {
                        width: 2,
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: '#f97316' },
                            { offset: 1, color: '#ff7b72' }
                        ])
                    },
                    itemStyle: { color: '#ff7b72' },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(255, 123, 114, 0.15)' },
                            { offset: 1, color: 'rgba(255, 123, 114, 0)' }
                        ])
                    }
                },
                {
                    name: 'ECMWF陣風',
                    type: 'line',
                    data: omData,
                    smooth: true,
                    connectNulls: true,
                    showSymbol: false,
                    lineStyle: {
                        width: 1.5,
                        type: 'dashed',
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: '#06b6d4' },
                            { offset: 1, color: '#58a6ff' }
                        ])
                    },
                    itemStyle: { color: '#58a6ff' },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(88, 166, 255, 0.1)' },
                            { offset: 1, color: 'rgba(88, 166, 255, 0)' }
                        ])
                    }
                }
            ]
        };

        forecastChartInstance.setOption(option, true);

        // 🚢 UX 新增：選中船期時，自動定位到該船當天預報數據點並顯示 Tooltip (夏季 05:00 / 冬季 06:00)
        try {
            const selectEl = document.getElementById('shipForecastSelect');
            if (selectEl && selectEl.options.length > 0) {
                const selectedText = selectEl.options[selectEl.selectedIndex].text;
                // 提取日期，selectedText 格式如 "6/9 LNG Endeavour"
                const datePart = selectedText.split(' ')[0]; // 取得 "6/9"
                if (datePart && datePart.includes('/')) {
                    const parts = datePart.split('/');
                    const mm = parts[0];
                    const dd = parts[1];
                    
                    // 判斷夏季或冬季：
                    // 夏季月份：4, 5, 6, 7, 8, 9
                    // 冬季月份：10, 11, 12, 1, 2, 3
                    const month = parseInt(parts[0], 10);
                    const isSummer = [4, 5, 6, 7, 8, 9].includes(month);
                    const targetTime = isSummer ? "05:00" : "06:00";
                    const targetLabel = `${mm}/${dd} ${targetTime}`;
                    
                    const targetIndex = timeData.indexOf(targetLabel);
                    if (targetIndex !== -1) {
                        // 計算 dataZoom 的 start 和 end，讓 targetIndex 居中
                        // 目前的 dataZoom 區間長度是 35% (end - start = 35)
                        const totalPoints = timeData.length;
                        const percent = (targetIndex / totalPoints) * 100;
                        let startPercent = percent - 17.5;
                        let endPercent = percent + 17.5;
                        
                        if (startPercent < 0) {
                            startPercent = 0;
                            endPercent = 35;
                        } else if (endPercent > 100) {
                            endPercent = 100;
                            startPercent = 65;
                        }
                        
                        // 1. 移動 DataZoom
                        forecastChartInstance.dispatchAction({
                            type: 'dataZoom',
                            start: startPercent,
                            end: endPercent
                        });
                        
                        // 2. 觸發 Tooltip 顯示
                        // 使用 setTimeout 確保 dataZoom 行動完成後再觸發 showTip，這樣定位更精確
                        setTimeout(() => {
                            if (forecastChartInstance) {
                                forecastChartInstance.dispatchAction({
                                    type: 'showTip',
                                    seriesIndex: 0,
                                    dataIndex: targetIndex
                                });
                            }
                        }, 80);
                    }
                }
            }
        } catch (e) {
            console.error("自動定位選中船期時間失敗:", e);
        }
    }

    // 觸發手動更新 ECharts 氣象資料 (呼叫 GAS 並以密碼保護)
    async function triggerForecastUpdate() {
        // 呼叫原本的密碼驗證彈窗
        const password = await getPasswordFromModal();
        if (password === null) return;
        
        if (password.trim() === "") {
            alert("❌ 密碼不能為空！");
            return;
        }

        const updateBtn = document.getElementById('forecastUpdateBtn');
        const statusEl = document.getElementById('forecastStatus');
        
        // 前端立刻進入鎖定狀態，防止二次點選
        updateBtn.disabled = true;
        updateBtn.innerHTML = `<span>⏳ 雲端更新中(約需1分鐘)...</span>`;
        statusEl.innerText = "數據更新中...";
        statusEl.style.color = "#d29922";

        try {
            // 呼叫 GAS 並帶入 trigger_update 行動與密碼
            const url = `${FIXED_GAS_API_URL}action=trigger_update&pwd=${encodeURIComponent(password)}`;
            const response = await fetch(url);
            const resData = await response.json();

            if (resData.status === "success") {
                statusEl.innerText = "指令已下達，雲端正在運行 Pipeline...";
                statusEl.style.color = "#e3b341";
            } else {
                alert("❌ 更新失敗: " + (resData.msg || resData.message || "未知錯誤"));
                updateBtn.disabled = false;
                updateBtn.innerHTML = `<span>🔄 手動更新</span>`;
                statusEl.innerText = "驗證失敗";
                statusEl.style.color = "#ff7b72";
            }
        } catch (error) {
            console.error("手動更新呼叫失敗:", error);
            alert("❌ 連線錯誤，請檢查網路狀態");
            updateBtn.disabled = false;
            updateBtn.innerHTML = `<span>🔄 手動更新</span>`;
            statusEl.innerText = "連線失敗";
            statusEl.style.color = "#ff7b72";
        }
    }

    window.onload = function() {

        initSystem();
    };
</script>
