<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺中港LNG船風力監控 (NV3.7)</title>
    <link rel="icon" href="app_icon.png" type="image/png">
    <link rel="apple-touch-icon" href="app_icon.png">

    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --primary-color: #4A90E2;
            --safe-color: #28a745;
            --warning-color: #dc3545;
            --waiting-color: #6c757d;
            --reset-color: #e83e8c; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { margin-top: 0; color: #000000; font-size: 1.4em; }
        
        .wind-container {
            display: flex;
            justify-content: center;
            align-items: baseline; 
            margin: 10px 0;
            color: #000000;
        }
        .wind-speed-num { font-size: 3.5em; font-weight: bold; }
        .wind-speed-unit { font-size: 1.2em; font-weight: normal; margin-left: 8px; color: #555555; }
        
        .time-display { font-size: 0.9em; color: #888; margin-bottom: 20px; }

        .dynamic-box {
            margin: 20px 0; padding: 15px; border-radius: 8px; font-size: 1.1em;
            transition: all 0.3s ease; display: none;
        }
        
        .status-waiting { background-color: #e9ecef; color: var(--waiting-color); border: 2px solid var(--waiting-color); }
        .status-warning { background-color: #ffeeba; color: var(--warning-color); border: 2px solid var(--warning-color); }
        .status-safe {
            background-color: #d4edda; color: var(--safe-color); border: 2px solid var(--safe-color);
            animation: breathing 2s infinite ease-in-out;
        }

        @keyframes breathing {
            0% { box-shadow: 0 0 5px rgba(40, 167, 69, 0.4); }
            50% { box-shadow: 0 0 25px rgba(40, 167, 69, 0.9); }
            100% { box-shadow: 0 0 5px rgba(40, 167, 69, 0.4); }
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.9em; margin-bottom: 5px; font-weight: bold; }
        .input-group input { 
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; 
            box-sizing: border-box; font-size: 1em; transition: 0.3s;
        }
        .input-group input:disabled {
            background-color: #e9ecef; color: #888888; border-color: #ddd; cursor: not-allowed;
        }
        
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 1.1em; font-weight: bold;
            cursor: pointer; margin-top: 10px; color: white; transition: 0.2s;
        }
        .btn-start { background-color: var(--primary-color); }
        .btn-start:hover { background-color: #357abd; }
        .btn-reset { background-color: var(--reset-color); } 
        .btn-reset:hover { background-color: #d81b60; }
        
        #loading { color: #888; font-size: 0.9em; margin-top: 15px; margin-bottom: 15px; }

        /* ★ NV3.7 新增：今日 POB 雙行紀錄區 (電子看板) */
        .pob-records {
            margin-top: 15px;
            padding: 15px;
            background-color: #d4edda; 
            border: 4px solid var(--safe-color); 
            border-radius: 8px;
            text-align: left;
            font-size: 1em; 
            font-weight: bold;
            color: #000000; 
            line-height: 1.6;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>臺中港LNG船風力監控 (NV3.7)</h2>
    
    <div class="wind-container">
        <div class="wind-speed-num" id="windSpeed">--</div>
        <div class="wind-speed-unit">m/s</div>
    </div>
    
    <div class="time-display" id="dataTime">讀取中...</div>

    <div id="dynamicBox" class="dynamic-box"></div>

    <div class="input-group">
        <label for="shipName">船名 (含備註)</label>
        <input type="text" id="shipName" placeholder="例如: Cobia LNG">
    </div>
    <div class="input-group">
        <label for="limitSpeed">限制風速 (m/s)</label>
        <input type="number" id="limitSpeed" step="0.1" placeholder="例如: 15.0">
    </div>

    <button class="btn btn-start" id="startBtn" onclick="setMode('start')">▶ 開始監控 (清除舊記錄)</button>
    <button class="btn btn-reset" id="resetBtn" onclick="setMode('reset')" style="display: none;">⏹ 結束監控並清空</button>

    <div id="loading"></div>

    <div id="pobList" class="pob-records"></div>
</div>

<script>
    // ==========================================
    // ⚠️ 部署必改：換成您最新發布的 GAS Web App URL
    // ==========================================
    const FIXED_GAS_API_URL = "https://script.google.com/macros/s/AKfycbwSs0kDZbl6Whua7UKmUMk1rlCuFgJHFhSIUA0nVTVmLujhrlbVXdiem4rN5WJIEg9brA/exec?";

    let refreshInterval;

    function getCurrentTimeHHMM() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        return `${hh}:${mm}`;
    }

    function updateDynamicBox(data) {
        const box = document.getElementById('dynamicBox');
        const shipName = data.shipName || "未知船隻";
        const limitSpeed = parseFloat(data.limitSpeed) || 0;
        const currentSpeed = parseFloat(data.speed) || 0;
        const seasonTime = data.seasonTime || "06:00";
        const currentTime = getCurrentTimeHHMM();
        
        box.className = "dynamic-box"; 
        box.style.display = "block";

        if (currentTime < seasonTime) {
            box.classList.add('status-waiting');
            box.innerHTML = `<strong>${shipName} 等待進港</strong><br><span style="font-size:0.8em;">(表定時間 ${seasonTime} 開始判定)</span>`;
        } else if (currentSpeed > limitSpeed) {
            box.classList.add('status-warning');
            box.innerHTML = `<strong>${shipName} 風速超標</strong><br><span style="font-size:0.8em;">(目前 ${currentSpeed} > 限制 ${limitSpeed})</span>`;
        } else {
            box.classList.add('status-safe');
            box.innerHTML = `<strong style="font-size:1.3em;">${shipName} 可進港</strong>`;
        }
    }

    function fetchData() {
        document.getElementById('loading').innerText = "更新資料中...";
        fetch(FIXED_GAS_API_URL + "action=display")
            .then(response => response.json())
            .then(data => {
                document.getElementById('windSpeed').innerText = data.speed ? data.speed : "--";
                document.getElementById('dataTime').innerText = "最後更新: " + (data.time ? data.time : "無資料");
                
                const shipInput = document.getElementById('shipName');
                const speedInput = document.getElementById('limitSpeed');
                
                // ★ 幽靈資料殺手：強硬管控輸入框狀態
                if (data.currentMode === 'start') {
                    // 監控中：強制填入後端字串並上鎖
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('resetBtn').style.display = 'block';
                    shipInput.disabled = true;
                    speedInput.disabled = true;
                    
                    if (document.activeElement !== shipInput && document.activeElement !== speedInput) {
                        shipInput.value = data.shipName;
                        speedInput.value = data.limitSpeed;
                    }
                    updateDynamicBox(data);
                } else {
                    // 停止中：強制解鎖，並強制保持空白
                    document.getElementById('startBtn').style.display = 'block';
                    document.getElementById('resetBtn').style.display = 'none';
                    shipInput.disabled = false;
                    speedInput.disabled = false;
                    
                    if (document.activeElement !== shipInput && document.activeElement !== speedInput) {
                        shipInput.value = "";
                        speedInput.value = "";
                    }
                    document.getElementById('dynamicBox').style.display = 'none';
                }

                // ★ NV3.7：處理底部的 POB 電子看板 (支援兩行)
                const pobList = document.getElementById('pobList');
                if (data.pob1 || data.pob2) {
                    let html = "";
                    if (data.pob1) html += `<div style="margin-bottom: ${data.pob2 ? '8px' : '0'};">• ${data.pob1}</div>`;
                    if (data.pob2) html += `<div>• ${data.pob2}</div>`;
                    pobList.innerHTML = html;
                    pobList.style.display = "block";
                } else {
                    pobList.style.display = "none";
                }

                document.getElementById('loading').innerText = "";
            })
            .catch(error => {
                document.getElementById('loading').innerText = "連線失敗，請稍後再試";
            });
    }

    function setMode(mode) {
        if (mode === 'reset') {
            const isConfirmed = confirm("確定要結束當前監控並清空所有紀錄嗎？");
            if (!isConfirmed) return; 
        }

        document.getElementById('loading').innerText = "設定中...";
        let url = FIXED_GAS_API_URL + "action=set_mode&mode=" + mode;
        
        if (mode === 'start') {
            const shipName = document.getElementById('shipName').value;
            const limitSpeed = document.getElementById('limitSpeed').value;
            if(!shipName || !limitSpeed) {
                alert("請填寫船名與限制風速！");
                document.getElementById('loading').innerText = "";
                return;
            }
            url += "&ship_name=" + encodeURIComponent(shipName) + "&limit_speed=" + encodeURIComponent(limitSpeed);
        } else if (mode === 'reset') {
            document.getElementById('shipName').value = "";
            document.getElementById('limitSpeed').value = "";
        }

        fetch(url)
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') fetchData(); 
            })
            .catch(error => {
                document.getElementById('loading').innerText = "設定失敗";
            });
    }

    window.onload = function() {
        fetchData();
        refreshInterval = setInterval(fetchData, 60000); 
    };
</script>

</body>
</html>
