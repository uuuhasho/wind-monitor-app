<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺中LNG船監控(NV4.6.9)</title>
    <link rel="icon" href="app_icon.png" type="image/png">
    <link rel="apple-touch-icon" href="app_icon.png">

    <meta name="theme-color" content="#4A90E2"/>
    <link rel="manifest" href="manifest.json">
    
    <!-- Apple-specific meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LNG監控">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --primary-color: #4A90E2;
            --safe-color: #28a745;
            --warning-color: #dc3545;
            --waiting-color: #6c757d;
            --reset-color: #e83e8c; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { margin-top: 0; color: #000000; font-size: 1.4em; }
        
        .wind-container {
            display: flex;
            justify-content: center;
            align-items: baseline; 
            margin: 10px 0;
            color: #000000;
        }
        .wind-speed-num { font-size: 3.5em; font-weight: bold; }
        .wind-speed-unit { font-size: 1.2em; font-weight: normal; margin-left: 8px; color: #555555; }
        
        .time-display { font-size: 0.9em; color: #888; margin-bottom: 20px; }

        .dynamic-box {
            margin: 20px 0; padding: 15px; border-radius: 8px; font-size: 1.1em;
            transition: all 0.3s ease; display: none;
        }
        
        .status-waiting { background-color: #e9ecef; color: var(--waiting-color); border: 2px solid var(--waiting-color); }
        .status-warning { background-color: #ffeeba; color: var(--warning-color); border: 2px solid var(--warning-color); }
        .status-safe {
            background-color: #d4edda; color: var(--safe-color); border: 2px solid var(--safe-color);
            animation: breathing 2s infinite ease-in-out;
        }

        @keyframes breathing {
            0% { box-shadow: 0 0 5px rgba(40, 167, 69, 0.4); }
            50% { box-shadow: 0 0 25px rgba(40, 167, 69, 0.9); }
            100% { box-shadow: 0 0 5px rgba(40, 167, 69, 0.4); }
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.9em; margin-bottom: 5px; font-weight: bold; }
        .input-group input { 
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; 
            box-sizing: border-box; font-size: 1em; transition: 0.3s;
        }
        .input-group input:disabled {
            background-color: #e9ecef; color: #888888; border-color: #ddd; cursor: not-allowed;
        }
        
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 1.1em; font-weight: bold;
            cursor: pointer; margin-top: 10px; color: white; transition: 0.2s;
        }
        .btn-start { background-color: var(--primary-color); }
        .btn-start:hover { background-color: #357abd; }
        .btn-reset { background-color: var(--reset-color); } 
        .btn-reset:hover { background-color: #d81b60; }
        
        #loading { color: #888; font-size: 0.9em; margin-top: 15px; margin-bottom: 15px; height: 20px; }

        .pob-records {
            margin-top: 15px;
            padding: 15px;
            background-color: #d4edda; 
            border: 4px solid var(--safe-color); 
            border-radius: 8px;
            text-align: left;
            font-size: 1em; 
            font-weight: bold;
            color: #000000; 
            line-height: 1.6;
            display: none;
        }

/* --- 密碼輸入視窗樣式 --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background-color: white; padding: 20px; border-radius: 12px;
            width: 80%; max-width: 300px; text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .modal-content input {
            width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc;
            border-radius: 6px; box-sizing: border-box; font-size: 1.2em; text-align: center;
        }
        .modal-buttons { display: flex; justify-content: space-between; gap: 10px; }
        .modal-btn {
            flex: 1; padding: 10px; border: none; border-radius: 6px; 
            font-size: 1em; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-cancel { background-color: #e9ecef; color: #333; }
        .btn-cancel:hover { background-color: #ccc; }
        .btn-confirm { background-color: var(--primary-color); color: white; }
        .btn-confirm:hover { background-color: #357abd; }

        /* 🌟 縮小 POB 時間欄位的提示文字字體 */
        #pobTime::placeholder {
            font-size: 0.85em;
            color: #bbb;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>🚢臺中LNG船監控 <span style="font-size: 0.6em; color:#4A90E2;"></h2>
    
    <div class="wind-container">
        <div class="wind-speed-num" id="windSpeed">--</div>
        <div class="wind-speed-unit">m/s</div>
    </div>
    
    <div class="time-display" id="dataTime">系統連線中...</div>

    <div id="dynamicBox" class="dynamic-box"></div>

    <div class="input-group">
        <label for="shipName">船名 </label>
        <input type="text" id="shipName" placeholder="例如: Cobia">
    </div>
    <div class="input-group">
        <label for="limitSpeed">限制風速 (m/s)</label>
        <input type="number" id="limitSpeed" step="0.1" placeholder="例如: 12.0">
    </div>

    <div class="input-group" id="pobTimeGroup" style="display: none; margin-top: 10px; border-top: 1px dashed #ccc; padding-top: 10px;">
        <label for="pobTime" style="color: var(--primary-color);">🕒 (非必要)手動輸入 POB 時間</label>
        <input type="text" id="pobTime" placeholder="如14:56" maxlength="5" style="text-align: center; font-size: 1.1em; letter-spacing: 1px;" oninput="formatPobTime(this)">
    </div>

    <button class="btn btn-start" id="startBtn" onclick="setMode('start')">▶ 開始監控 </button>
    <button class="btn btn-reset" id="resetBtn" onclick="setMode('reset')" style="display: none;">⏹ 結束監控 </button>

    <div id="loading"></div>
    <div id="pobList" class="pob-records"></div>
</div>

<div id="pwdModal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-top: 0; color: #333;">🔐 安全驗證</h3>
        <p style="font-size: 0.9em; color: #666; margin-bottom: 5px;">請輸入操作授權密碼：</p>
        <input type="password" id="modalPwdInput" placeholder="輸入密碼">
        <div class="modal-buttons">
            <button class="modal-btn btn-cancel" onclick="closePwdModal(false)">取消</button>
            <button class="modal-btn btn-confirm" onclick="closePwdModal(true)">確認</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // ⚠️ 必填區：請更換為您的專屬網址
    // ==========================================
    const FIXED_GAS_API_URL = "https://script.google.com/macros/s/AKfycbwSs0kDZbl6Whua7UKmUMk1rlCuFgJHFhSIUA0nVTVmLujhrlbVXdiem4rN5WJIEg9brA/exec?";
    const FIREBASE_DB_URL = "https://milkshake-monitor-default-rtdb.asia-southeast1.firebasedatabase.app/"; 
    // ==========================================

    // 初始化 Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp({ databaseURL: FIREBASE_DB_URL });
    }
    const db = firebase.database();

    let localSeasonTime = "06:00"; // 預設，會被 GAS 覆蓋

    function getCurrentDateStr() {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    function getCurrentTimeHHMM() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        return `${hh}:${mm}`;
    }

    // 當 Firebase 資料變更時，更新動態判定框
    function updateDynamicBox(data) {
        const box = document.getElementById('dynamicBox');
        if (!data || data.app_mode !== 'start') {
            box.style.display = 'none';
            return;
        }

        const shipName = data.ship_name || "未知船隻";
        const limitSpeed = parseFloat(data.limit_speed) || 0;
        const currentSpeed = parseFloat(data.current_wind) || 0;
        // 🌟 優化：直接從 Firebase 取得季節時間
        const seasonTime = data.season_time || "--:--"; 
        const currentTime = getCurrentTimeHHMM();
        
        box.className = "dynamic-box"; 
        box.style.display = "block";

        if (seasonTime === "--:--" || currentTime < seasonTime) {
            box.classList.add('status-waiting');
            box.innerHTML = `<strong>${shipName} 等待進港</strong><br><span style="font-size:0.8em;">(表定時間 ${seasonTime} 開始判定)</span>`;
        } else if (currentSpeed > limitSpeed) {
            box.classList.add('status-warning');
            box.innerHTML = `<strong>${shipName} 無法進港</strong><br><span style="font-size:0.8em;">(目前 ${currentSpeed} > 限制 ${limitSpeed})</span>`;
        } else {
            box.classList.add('status-safe');
            box.innerHTML = `<strong style="font-size:1.3em;">${shipName} 可進港</strong>`;
        }
    }

    // 啟動 Firebase 即時監聽
    function startFirebaseListeners() {
        const dateStr = getCurrentDateStr();

        // 1. 監聽【系統狀態與即時風速】(毫秒級更新)
        db.ref('active_status').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            // 更新風速與時間
            document.getElementById('windSpeed').innerText = data.current_wind !== undefined ? data.current_wind : "--";
            document.getElementById('dataTime').innerText = "最後更新: " + (data.last_update ? data.last_update : "無資料");
            
            const shipInput = document.getElementById('shipName');
            const speedInput = document.getElementById('limitSpeed');

            // 更新 UI 狀態 (避免幽靈資料)
            if (data.app_mode === 'start') {
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('resetBtn').style.display = 'block';
                document.getElementById('pobTimeGroup').style.display = 'block';
                shipInput.disabled = true;
                speedInput.disabled = true;
                
                if (document.activeElement !== shipInput) shipInput.value = data.ship_name || "";
                if (document.activeElement !== speedInput) speedInput.value = data.limit_speed || "";
            } else {
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('resetBtn').style.display = 'none';
                document.getElementById('pobTimeGroup').style.display = 'none';
                shipInput.disabled = false;
                speedInput.disabled = false;
                
                if (document.activeElement !== shipInput) shipInput.value = "";
                if (document.activeElement !== speedInput) speedInput.value = "";
                document.getElementById('pobTime').value = ""; // 清空
            }

            // 更新呼吸燈
            updateDynamicBox(data);
        });

        // 2. 監聽【當日 POB 紀錄板】(多船自動分行)
        db.ref('daily_records/' + dateStr).on('value', (snapshot) => {
            const records = snapshot.val();
            const pobList = document.getElementById('pobList');
            let html = "";

            if (records) {
                // 遍歷當日所有卡片，取出 pob_info
                Object.values(records).forEach(card => {
                    if (card.pob_info && card.pob_info.formatted_msg) {
                        html += `<div style="margin-bottom: 8px;">• ${card.pob_info.formatted_msg}</div>`;
                    }
                });
            }

            if (html !== "") {
                pobList.innerHTML = html;
                pobList.style.display = "block";
            } else {
                pobList.style.display = "none";
            }
        });
    }

    // 🌟 優化：移除 GAS 初始化等待，網頁載入直接啟動 Firebase 即時監聽
    function initSystem() {
        document.getElementById('loading').innerText = "連線中...";
        startFirebaseListeners();
        setTimeout(() => {
            document.getElementById('loading').innerText = "";
        }, 800); // 短暫顯示後清除
    }

   // --- 密碼視窗控制邏輯 ---
    let pwdResolve = null; // 用來等待使用者按鈕的變數

    function getPasswordFromModal() {
        return new Promise((resolve) => {
            const modal = document.getElementById('pwdModal');
            const input = document.getElementById('modalPwdInput');
            input.value = ''; // 每次打開先清空密碼
            modal.style.display = 'flex'; // 顯示視窗
            input.focus(); // 自動對焦輸入框
            pwdResolve = resolve; // 把決定權交給按鈕
        });
    }

   function closePwdModal(isConfirm) {
        const modal = document.getElementById('pwdModal');
        const input = document.getElementById('modalPwdInput');
        modal.style.display = 'none'; 
        
        if (pwdResolve) {
            pwdResolve(isConfirm ? input.value : null); 
            pwdResolve = null;
        }
    }

    // 🌟 自動格式化 POB 時間：輸入 1423 自動轉 14:23
    function formatPobTime(input) {
        let val = input.value.replace(/[^\d]/g, ''); // 只保留數字
        if (val.length >= 3) {
            input.value = val.slice(0, 2) + ':' + val.slice(2, 4);
        } else {
            input.value = val;
        }
    }

    // --- 按鈕控制 (雙效合一 + 星號密碼視窗 + 邏輯優化版) ---
    async function setMode(mode) {
        // 🌟 優化：如果是開始監控，先檢查有沒有填寫資料，沒填就不往下走
        let shipName = "";
        let limitSpeed = "";
        let pobTime = "";

        if (mode === 'start') {
            shipName = document.getElementById('shipName').value;
            limitSpeed = document.getElementById('limitSpeed').value;
            if(!shipName || !limitSpeed) {
                alert("❌ 請先填寫船名與限制風速！");
                return; // 提早阻斷，不用問密碼了
            }
        }

        if (mode === 'reset') {
            pobTime = document.getElementById('pobTime').value;
            if (pobTime) {
                const parts = pobTime.split(':');
                if (parts.length !== 2 || parts[0].length !== 2 || parts[1].length !== 2) {
                    alert("❌ POB 時間格式錯誤，請輸入 4 位數字 (如 1423)");
                    return;
                }
                
                const hour = parseInt(parts[0]);
                const min = parseInt(parts[1]);

                if (hour < 4 || hour > 17 || min < 0 || min > 59) {
                    alert("❌ POB 時間超出範圍：\n小時須為 04~17\n分鐘須為 00~59");
                    return;
                }
            }
        }

        // 1. 呼叫我們自訂的密碼視窗，並等待使用者輸入
        const password = await getPasswordFromModal();
        if (password === null) return; 

        // 2. 如果是要結束，先在網頁端確認
        if (mode === 'reset' && !confirm("⚠️ 確定要手動結束當前監控嗎？" + (pobTime ? `\n(將同步紀錄 ${pobTime} POB 並發送推播)` : ""))) {
            return;
        }

        document.getElementById('loading').innerText = "驗證與傳送指令中...";

        try {
            // 3. 將指令與密碼打包送給 GAS
            let url = FIXED_GAS_API_URL + "action=set_mode&mode=" + mode + "&pwd=" + encodeURIComponent(password);
            
            if (mode === 'start') {
                url += "&ship_name=" + encodeURIComponent(shipName) + "&limit_speed=" + encodeURIComponent(limitSpeed);
            } else if (mode === 'reset' && pobTime) {
                url += "&pob_time=" + encodeURIComponent(pobTime);
            }

            // 4. 等待結果
            const response = await fetch(url);
            const data = await response.json();

            // 5. 檢查後端回傳的狀態
            if (data.status === "error") {
                alert(data.msg); 
            }
            
            document.getElementById('loading').innerText = "";
            
        } catch (error) {
            document.getElementById('loading').innerText = "設定失敗，請檢查網路連線";
        }
    }

    window.onload = function() {
        initSystem();
    };
</script>

</body>
</html>
