<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺中LNG船監控(NV4.7.3)</title>
    <link rel="icon" href="app_icon.png" type="image/png">
    <link rel="apple-touch-icon" href="app_icon.png">

    <meta name="theme-color" content="#4A90E2"/>
    <link rel="manifest" href="manifest.json">
    
    <!-- Apple-specific meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LNG監控">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-color: #EBF3FC;
            --card-bg: #ffffff;
            --text-main: #555555;
            --text-navy: #0A2540; /* 深藍色標題與速度字型 */
            --text-blue: #10458C; /* 藍色焦點與表頭 */
            --border-light: #E6EEF8; /* 內邊框 */
            --primary-color: #10458C;
            --safe-color: #137333;
            --warning-color: #C5221F;
            --waiting-color: #5F6368;
            --reset-color: #D93025; 
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #EBF3FC 0%, #F5F9FD 100%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(16, 69, 140, 0.06);
            padding: 30px 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }

        h2 { 
            margin-top: 0; 
            margin-bottom: 24px;
            color: var(--text-navy); 
            font-size: 1.5em; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .wind-container {
            display: flex;
            justify-content: center;
            align-items: baseline; 
            margin: 15px 0 5px 0;
            color: var(--text-navy);
        }
        .wind-speed-num { 
            font-size: 4.5em; 
            font-weight: 700; 
            letter-spacing: -2px;
            line-height: 1;
        }
        .wind-speed-unit { 
            font-size: 1.3em; 
            font-weight: 500; 
            margin-left: 6px; 
            color: #6B7A90; 
        }
        
        .time-display { 
            font-size: 0.85em; 
            color: #8C9CAE; 
            margin-bottom: 25px; 
        }

        .dynamic-box {
            margin: 20px 0; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 1.05em;
            transition: all 0.3s ease; 
            display: none;
            box-sizing: border-box;
        }
        
        .status-waiting { 
            background-color: #F1F3F4; 
            color: var(--waiting-color); 
            border: 1px solid #BDC1C6; 
        }
        .status-warning { 
            background-color: #FCE8E6; 
            color: var(--warning-color); 
            border: 1px solid #F28B82; 
        }
        .status-safe {
            background-color: #E6F4EA; 
            color: var(--safe-color); 
            border: 1px solid #81C995;
            animation: breathing 2s infinite ease-in-out;
        }

        @keyframes breathing {
            0% { box-shadow: 0 0 5px rgba(25, 135, 84, 0.2); }
            50% { box-shadow: 0 0 20px rgba(25, 135, 84, 0.6); }
            100% { box-shadow: 0 0 5px rgba(25, 135, 84, 0.2); }
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.9em; margin-bottom: 6px; font-weight: 600; color: var(--text-navy); }
        .input-group input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #D5E1F2; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1em; 
            transition: all 0.2s ease;
            color: var(--text-navy);
            background-color: #FFFFFF;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--text-blue);
            box-shadow: 0 0 0 3px rgba(16, 69, 140, 0.12);
        }
        .input-group input:disabled {
            background-color: #F1F3F4; 
            color: #888888; 
            border-color: #E6EEF8; 
            cursor: not-allowed;
        }
        
        .btn {
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.05em; 
            font-weight: 600;
            cursor: pointer; 
            margin-top: 10px; 
            color: white; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(16, 69, 140, 0.1);
        }
        .btn-start { background-color: var(--primary-color); }
        .btn-start:hover { background-color: #0D3A75; transform: translateY(-1px); }
        .btn-start:active { transform: translateY(0); }
        .btn-reset { background-color: var(--reset-color); } 
        .btn-reset:hover { background-color: #B52218; transform: translateY(-1px); }
        .btn-reset:active { transform: translateY(0); }
        
        #loading { color: #8C9CAE; font-size: 0.9em; margin-top: 15px; margin-bottom: 15px; height: 20px; }

        .pob-records {
            margin-top: 15px;
            padding: 16px;
            background-color: #E6F4EA; 
            border: 1px solid #81C995; 
            border-radius: 12px;
            text-align: left;
            font-size: 0.95em; 
            font-weight: 600;
            color: var(--safe-color); 
            line-height: 1.6;
            display: none;
            box-sizing: border-box;
        }

/* --- 密碼輸入視窗樣式 --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(10, 37, 64, 0.4); 
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background-color: white; 
            padding: 24px; 
            border-radius: 20px;
            width: 85%; 
            max-width: 320px; 
            text-align: center;
            box-shadow: 0 20px 50px rgba(10, 37, 64, 0.15);
            box-sizing: border-box;
        }
        .modal-content h3 {
            margin-top: 0;
            color: var(--text-navy);
            font-weight: 700;
        }
        .modal-content input {
            width: 100%; 
            padding: 12px; 
            margin: 16px 0; 
            border: 1px solid #D5E1F2;
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1.2em; 
            text-align: center;
            color: var(--text-navy);
            transition: all 0.2s ease;
        }
        .modal-content input:focus {
            outline: none;
            border-color: var(--text-blue);
            box-shadow: 0 0 0 3px rgba(16, 69, 140, 0.12);
        }
        .modal-buttons { display: flex; justify-content: space-between; gap: 10px; }
        .modal-btn {
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            font-size: 0.95em; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s ease;
        }
        .btn-cancel { background-color: #F1F3F4; color: #5F6368; }
        .btn-cancel:hover { background-color: #E8EAED; }
        .btn-confirm { background-color: var(--primary-color); color: white; }
        .btn-confirm:hover { background-color: #0D3A75; }

        /* 🌟 縮小 POB 時間欄位的提示文字字體 */
        #pobTime::placeholder {
            font-size: 0.85em;
            color: #A0B0C4;
        }

        /* --- 船期表樣式 --- */
        .schedule-section {
            margin-top: 15px;
            background: #ffffff;
            border-radius: 18px;
            border: 1px solid var(--border-light);
            padding: 16px;
            text-align: left;
            box-sizing: border-box;
        }
        .schedule-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; border-bottom: 1px solid var(--border-light); padding-bottom: 10px;
        }
        .schedule-header h3 { 
            margin: 0; 
            font-size: 1.15em; 
            color: var(--text-blue); 
            font-weight: 600;
        }
        .cpc-btn {
            width: 32px;
            height: 32px;
            cursor: pointer;
            transition: all 0.2s ease;
            object-fit: contain;
        }
        .cpc-btn:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }
        .cpc-btn:active {
            transform: scale(0.9);
        }
        .schedule-table { width: 100%; border-collapse: collapse; font-size: 0.95em; }
        .schedule-table th, .schedule-table td {
            padding: 12px 6px; 
            border-bottom: 1px solid #EBF1F7; 
            text-align: center;
        }
        .schedule-table th { 
            color: var(--text-blue); 
            font-weight: 600; 
            background-color: #F0F5FD;
        }
        .schedule-table th:first-child {
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }
        .schedule-table th:last-child {
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }
        
        .schedule-table td {
            color: #555555; /* 「日期」、「船名」、「速限」保持深灰字體 */
        }
        
        .schedule-row-safe {
            background-color: #E6F4EA !important; 
            color: var(--safe-color) !important; 
            font-weight: bold;
            animation: row-breathing 2s infinite ease-in-out;
        }
        .schedule-row-safe td {
            color: var(--safe-color) !important;
        }
        .schedule-row-warning { 
            background-color: #FCE8E6 !important; 
            color: var(--warning-color) !important; 
            font-weight: bold; 
        }
        .schedule-row-warning td {
            color: var(--warning-color) !important;
        }
        .schedule-row-waiting { 
            background-color: #F1F3F4 !important; 
            color: var(--waiting-color) !important; 
            font-weight: bold; 
        }
        .schedule-row-waiting td {
            color: var(--waiting-color) !important;
        }

        /* 修正 Apple 設備對於 tr 標籤不支援陰影動畫的問題，改為背景色柔和漸變 */
        @keyframes row-breathing {
            0% { background-color: #E6F4EA; }
            50% { background-color: #D2F0DA; }
            100% { background-color: #E6F4EA; }
        }

        /* 讓表格區塊可滾動的樣式 */
        .table-wrapper {
            max-height: 215px; /* 控制最大高度，超過時出現捲軸 */
            overflow-y: auto;
        }
        .table-wrapper::-webkit-scrollbar { width: 6px; }
        .table-wrapper::-webkit-scrollbar-track { background: transparent; }
        .table-wrapper::-webkit-scrollbar-thumb { background: #D5E1F2; border-radius: 4px; }
        
        /* 固定表格標題列 */
        .schedule-table th {
            position: sticky;
            top: 0;
            z-index: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚢 臺中LNG船監控</h2>
    
    <div class="wind-container">
        <div class="wind-speed-num" id="windSpeed">--</div>
        <div class="wind-speed-unit">m/s</div>
    </div>
    
    <div class="time-display" id="dataTime">系統連線中...</div>

    <!-- POB 紀錄板往上移 -->
    <div id="pobList" class="pob-records" style="margin-bottom: 15px;"></div>

    <div id="dynamicBox" class="dynamic-box"></div>

    <!-- 船期表區塊 -->
    <div class="schedule-section">
        <div class="schedule-header">
            <h3>船期表</h3>
            <img src="fast-forward.png" class="cpc-btn" onclick="openManualModal()" alt="設定" title="手動設定">
        </div>
        <div class="table-wrapper">
            <table class="schedule-table">
                <thead>
                    <tr><th>日期</th><th>船名</th><th>速限</th></tr>
                </thead>
                <tbody id="scheduleBody">
                    <tr><td colspan="3" style="text-align:center; color:#888888;">載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="loading"></div>
</div>

<!-- 手動監控設定 Modal -->
<div id="manualModal" class="modal-overlay">
    <div class="modal-content" style="max-width: 320px;">
        <h3 style="margin-top: 0; color: #333;">⚙️ 手動監控設定</h3>
        <div class="input-group"><label for="shipName">船名</label><input type="text" id="shipName" placeholder="例如: Cobia"></div>
        <div class="input-group"><label for="limitSpeed">限制風速 (m/s)</label><input type="number" id="limitSpeed" step="0.1" placeholder="例如: 12.0"></div>
        <div class="input-group" id="pobTimeGroup" style="display: none; margin-top: 10px; border-top: 1px dashed #ccc; padding-top: 10px;"><label for="pobTime" style="color: var(--primary-color);">🕒 (非必要)手動輸入 POB 時間</label><input type="text" id="pobTime" placeholder="如14:56" maxlength="5" style="text-align: center; font-size: 1.1em; letter-spacing: 1px;" oninput="formatPobTime(this)"></div>
        <button class="btn btn-start" id="startBtn" onclick="setMode('start')">▶ 開始監控</button>
        <button class="btn btn-reset" id="resetBtn" onclick="setMode('reset')" style="display: none;">⏹ 結束監控</button>
        <button class="btn btn-cancel" onclick="closeManualModal()" style="width: 100%; margin-top: 10px; background-color: #eee;">關閉</button>
    </div>
</div>

<div id="pwdModal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-top: 0; color: #333;">🔐 安全驗證</h3>
        <p style="font-size: 0.9em; color: #666; margin-bottom: 5px;">請輸入密碼：</p>
        <input type="password" id="modalPwdInput" placeholder="輸入密碼">
        <div class="modal-buttons">
            <button class="modal-btn btn-cancel" onclick="closePwdModal(false)">取消</button>
            <button class="modal-btn btn-confirm" onclick="closePwdModal(true)">確認</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // ⚠️ 必填區：請更換為您的專屬網址
    // ==========================================
    const FIXED_GAS_API_URL = "https://script.google.com/macros/s/AKfycbwSs0kDZbl6Whua7UKmUMk1rlCuFgJHFhSIUA0nVTVmLujhrlbVXdiem4rN5WJIEg9brA/exec?";
    const FIREBASE_DB_URL = "https://milkshake-monitor-default-rtdb.asia-southeast1.firebasedatabase.app/"; 
    // ==========================================

    // 初始化 Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp({ databaseURL: FIREBASE_DB_URL });
    }
    const db = firebase.database();

    let currentAppData = {};
    let scheduleDataList = [];

    let localSeasonTime = "06:00"; // 預設，會被 GAS 覆蓋

    function getCurrentDateStr() {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    function getCurrentTimeHHMM() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        return `${hh}:${mm}`;
    }

    // 當 Firebase 資料變更時，更新動態判定框
    function updateDynamicBox(data) {
        currentAppData = data;
        const box = document.getElementById('dynamicBox');
        let currentStatusClass = "";

        if (!data || data.app_mode !== 'start') {
            box.style.display = 'none';
        } else {
            const shipName = data.ship_name || "未知船隻";
            const limitSpeed = parseFloat(data.limit_speed) || 0;
            const currentSpeed = parseFloat(data.current_wind) || 0;
            const seasonTime = data.season_time || "--:--"; 
            const currentTime = getCurrentTimeHHMM();
            
            box.className = "dynamic-box"; 
            box.style.display = "block";

            if (seasonTime === "--:--" || currentTime < seasonTime) {
                currentStatusClass = 'schedule-row-waiting';
                box.classList.add('status-waiting');
                box.innerHTML = `<strong>${shipName} 等待進港</strong><br><span style="font-size:0.8em;">(表定時間 ${seasonTime} 開始判定)</span>`;
            } else if (currentSpeed > limitSpeed) {
                currentStatusClass = 'schedule-row-warning';
                box.classList.add('status-warning');
                box.innerHTML = `<strong>${shipName} 無法進港</strong><br><span style="font-size:0.8em;">(目前 ${currentSpeed} > 限制 ${limitSpeed})</span>`;
            } else {
                currentStatusClass = 'schedule-row-safe';
                box.classList.add('status-safe');
                box.innerHTML = `<strong style="font-size:1.3em;">${shipName} 可進港</strong>`;
            }
        }
        updateTableHighlight(currentStatusClass);
    }

    // 🌟 更新表格特定列的亮燈特效
    function updateTableHighlight(statusClass) {
        const rows = document.querySelectorAll('#scheduleBody tr[data-shipname]');
        rows.forEach(row => {
            row.classList.remove('schedule-row-safe', 'schedule-row-warning', 'schedule-row-waiting');
            const rowShipName = row.getAttribute('data-shipname');
            if (currentAppData.app_mode === 'start' && rowShipName === currentAppData.ship_name && statusClass) {
                row.classList.add(statusClass);
            }
        });
    }



    // 🌟 將陣列渲染為表格
    function renderScheduleTable() {
        const tbody = document.getElementById('scheduleBody');
        if (!scheduleDataList || scheduleDataList.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#888;">目前無未來船期資料</td></tr>';
            return;
        }
        let html = '';
        scheduleDataList.forEach(item => {
            html += `<tr data-shipname="${item.ship_name}">
                        <td>${item.d}</td>
                        <td>${item.ship_name}</td>
                        <td>${item.limit_speed}</td>
                     </tr>`;
        });
        tbody.innerHTML = html;
        updateDynamicBox(currentAppData); // 重繪表格燈號避免被洗掉
    }

    // 🌟 備用機制：若 Firebase 讀取失敗，直接向 GAS API 請求船期資料
    async function fetchScheduleFromGas() {
        try {
            const response = await fetch(FIXED_GAS_API_URL + "action=display");
            const data = await response.json();
            if (data && data.schedule_list) {
                scheduleDataList = data.schedule_list;
                renderScheduleTable();
            }
        } catch (error) {
            console.error("從 GAS 獲取船期表失敗:", error);
            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#dc3545;">載入失敗，請檢查網路連線</td></tr>';
        }
    }

    function openManualModal() { document.getElementById('manualModal').style.display = 'flex'; }
    function closeManualModal() { document.getElementById('manualModal').style.display = 'none'; }

    // 啟動 Firebase 即時監聽
    function startFirebaseListeners() {
        const dateStr = getCurrentDateStr();

        // 1. 監聽【系統狀態與即時風速】(毫秒級更新)
        db.ref('active_status').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            // 更新風速與時間
            document.getElementById('windSpeed').innerText = data.current_wind !== undefined ? data.current_wind : "--";
            document.getElementById('dataTime').innerText = "最後更新: " + (data.last_update ? data.last_update : "無資料");
            
            const shipInput = document.getElementById('shipName');
            const speedInput = document.getElementById('limitSpeed');

            // 更新 UI 狀態 (避免幽靈資料)
            if (data.app_mode === 'start') {
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('resetBtn').style.display = 'block';
                document.getElementById('pobTimeGroup').style.display = 'block';
                shipInput.disabled = true;
                speedInput.disabled = true;
                
                if (document.activeElement !== shipInput) shipInput.value = data.ship_name || "";
                if (document.activeElement !== speedInput) speedInput.value = data.limit_speed || "";
            } else {
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('resetBtn').style.display = 'none';
                document.getElementById('pobTimeGroup').style.display = 'none';
                shipInput.disabled = false;
                speedInput.disabled = false;
                
                if (document.activeElement !== shipInput) shipInput.value = "";
                if (document.activeElement !== speedInput) speedInput.value = "";
                document.getElementById('pobTime').value = ""; // 清空
            }

            // 更新呼吸燈
            updateDynamicBox(data);
        });

        // 2. 監聽【當日 POB 紀錄板】(多船自動分行)
        db.ref('daily_records/' + dateStr).on('value', (snapshot) => {
            const records = snapshot.val();
            const pobList = document.getElementById('pobList');
            let html = "";

            if (records) {
                // 遍歷當日所有卡片，取出 pob_info
                Object.values(records).forEach(card => {
                    if (card.pob_info && card.pob_info.formatted_msg) {
                        html += `<div style="margin-bottom: 8px;">• ${card.pob_info.formatted_msg}</div>`;
                    }
                });
            }

            if (html !== "") {
                pobList.innerHTML = html;
                pobList.style.display = "block";
            } else {
                pobList.style.display = "none";
            }
        });

        // 3. 監聽【未來船期表】(實時同步，秒速渲染)
        db.ref('schedule_list').on('value', (snapshot) => {
            scheduleDataList = snapshot.val() || [];
            renderScheduleTable();
        }, (error) => {
            console.warn("Firebase schedule_list 讀取受限，嘗試從 GAS 備用接口獲取...", error);
            fetchScheduleFromGas();
        });
    }

    // 🌟 優化：移除 GAS 初始化等待，網頁載入直接啟動 Firebase 即時監聽
    function initSystem() {
        document.getElementById('loading').innerText = "連線中...";
        startFirebaseListeners();
        setTimeout(() => {
            document.getElementById('loading').innerText = "";
        }, 800); // 短暫顯示後清除
    }

   // --- 密碼視窗控制邏輯 ---
    let pwdResolve = null; // 用來等待使用者按鈕的變數

    function getPasswordFromModal() {
        return new Promise((resolve) => {
            const modal = document.getElementById('pwdModal');
            const input = document.getElementById('modalPwdInput');
            input.value = ''; // 每次打開先清空密碼
            modal.style.display = 'flex'; // 顯示視窗
            input.focus(); // 自動對焦輸入框
            pwdResolve = resolve; // 把決定權交給按鈕
        });
    }

   function closePwdModal(isConfirm) {
        const modal = document.getElementById('pwdModal');
        const input = document.getElementById('modalPwdInput');
        modal.style.display = 'none'; 
        
        if (pwdResolve) {
            pwdResolve(isConfirm ? input.value : null); 
            pwdResolve = null;
        }
    }

    // 🌟 自動格式化 POB 時間：輸入 1423 自動轉 14:23
    function formatPobTime(input) {
        let val = input.value.replace(/[^\d]/g, ''); // 只保留數字
        if (val.length >= 3) {
            input.value = val.slice(0, 2) + ':' + val.slice(2, 4);
        } else {
            input.value = val;
        }
    }

    // --- 按鈕控制 (雙效合一 + 星號密碼視窗 + 邏輯優化版) ---
    async function setMode(mode) {
        // 🌟 優化：如果是開始監控，先檢查有沒有填寫資料，沒填就不往下走
        let shipName = "";
        let limitSpeed = "";
        let pobTime = "";

        if (mode === 'start') {
            shipName = document.getElementById('shipName').value;
            limitSpeed = document.getElementById('limitSpeed').value;
            if(!shipName || !limitSpeed) {
                alert("❌ 請先填寫船名與限制風速！");
                return; // 提早阻斷，不用問密碼了
            }
        }

        if (mode === 'reset') {
            pobTime = document.getElementById('pobTime').value;
            if (pobTime) {
                const parts = pobTime.split(':');
                if (parts.length !== 2 || parts[0].length !== 2 || parts[1].length !== 2) {
                    alert("❌ POB 時間格式錯誤，請輸入 4 位數字 (如 1423)");
                    return;
                }
                
                const hour = parseInt(parts[0]);
                const min = parseInt(parts[1]);

                if (hour < 4 || hour > 17 || min < 0 || min > 59) {
                    alert("❌ POB 時間超出範圍：\n小時須為 04~17\n分鐘須為 00~59");
                    return;
                }
            }
        }

        // 1. 呼叫我們自訂的密碼視窗，並等待使用者輸入
        const password = await getPasswordFromModal();
        if (password === null) return; 

        // 2. 如果是要結束，先在網頁端確認
        if (mode === 'reset' && !confirm("⚠️ 確定要手動結束當前監控嗎？" + (pobTime ? `\n(將同步紀錄 ${pobTime} POB 並發送推播)` : ""))) {
            return;
        }

        document.getElementById('loading').innerText = "驗證與傳送指令中...";

        try {
            // 3. 將指令與密碼打包送給 GAS
            let url = FIXED_GAS_API_URL + "action=set_mode&mode=" + mode + "&pwd=" + encodeURIComponent(password);
            
            if (mode === 'start') {
                url += "&ship_name=" + encodeURIComponent(shipName) + "&limit_speed=" + encodeURIComponent(limitSpeed);
            } else if (mode === 'reset' && pobTime) {
                url += "&pob_time=" + encodeURIComponent(pobTime);
            }

            // 4. 等待結果
            const response = await fetch(url);
            const data = await response.json();

            // 5. 檢查後端回傳的狀態
            if (data.status === "error") {
                alert(data.msg); 
            } else if (mode === 'reset' && !pobTime && data.has_tomorrow_ship === false) {
                // 🌟 修正：手動結束、未輸入 POB (代表未進港)、且明天無船，才彈窗詢問預約
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                const confirmMsg = `明日是否繼續監控 [${data.last_ship_name}]？`;
                
                if (confirm(confirmMsg)) {
                    document.getElementById('loading').innerText = "正在為您預約明日監控...";
                    const reserveUrl = FIXED_GAS_API_URL + "action=reserve_next&ship_name=" + encodeURIComponent(data.last_ship_name) + 
                                       "&limit_speed=" + data.last_limit_speed + "&pwd=" + encodeURIComponent(password);
                    
                    const resRes = await fetch(reserveUrl);
                    const resData = await resRes.json();
                    
                    if (resData.status === "success") {
                        alert("✅ 預約成功！明日 04:00 將自動啟動。");
                    } else {
                        alert("❌ 預約失敗：" + resData.msg);
                    }
                }
                closeManualModal();
            } else {
                closeManualModal();
            }
            
            document.getElementById('loading').innerText = "";
            
        } catch (error) {
            document.getElementById('loading').innerText = "設定失敗，請檢查網路連線";
        }
    }

    window.onload = function() {
        initSystem();
    };
</script>
