<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北堤風速監控儀表板 (NV3.0)</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --primary-color: #4A90E2;
            --safe-color: #28a745;
            --warning-color: #dc3545;
            --waiting-color: #6c757d;
            --pob-color: #6f42c1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { margin-top: 0; color: var(--primary-color); font-size: 1.4em; }
        
        /* 風速顯示區 */
        .wind-display {
            font-size: 3.5em;
            font-weight: bold;
            margin: 10px 0;
            color: var(--primary-color);
        }
        .time-display { font-size: 0.9em; color: #888; margin-bottom: 20px; }

        /* ★ NV3.0 動態說明框 */
        .dynamic-box {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1em;
            transition: all 0.3s ease;
            display: none; /* 預設隱藏，讀取資料後顯示 */
        }

        /* 動態說明框的四種狀態 */
        .status-pob { background-color: #f3e8ff; color: var(--pob-color); border: 2px solid var(--pob-color); }
        .status-waiting { background-color: #e9ecef; color: var(--waiting-color); border: 2px solid var(--waiting-color); }
        .status-warning { background-color: #ffeeba; color: var(--warning-color); border: 2px solid var(--warning-color); }
        
        /* 綠色呼吸燈特效 */
        .status-safe {
            background-color: #d4edda;
            color: var(--safe-color);
            border: 2px solid var(--safe-color);
            animation: breathing 2s infinite ease-in-out;
        }

        @keyframes breathing {
            0% { box-shadow: 0 0 5px rgba(40, 167, 69, 0.4); }
            50% { box-shadow: 0 0 25px rgba(40, 167, 69, 0.9); }
            100% { box-shadow: 0 0 5px rgba(40, 167, 69, 0.4); }
        }

        /* 輸入框與按鈕 */
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.9em; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 1.1em; font-weight: bold;
            cursor: pointer; margin-top: 10px; color: white; transition: 0.2s;
        }
        .btn-start { background-color: var(--primary-color); }
        .btn-start:hover { background-color: #357abd; }
        .btn-stop { background-color: var(--warning-color); }
        .btn-stop:hover { background-color: #c82333; }
        
        #loading { color: #888; font-size: 0.9em; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>北堤風速監控 (NV3.0)</h2>
    
    <div class="wind-display" id="windSpeed">--</div>
    <div class="time-display" id="dataTime">讀取中...</div>

    <div id="dynamicBox" class="dynamic-box">
        </div>

    <div class="input-group">
        <label for="shipName">船名 (含備註)</label>
        <input type="text" id="shipName" placeholder="例如: Cobia LNG">
    </div>
    <div class="input-group">
        <label for="limitSpeed">限制風速 (m/s)</label>
        <input type="number" id="limitSpeed" step="0.1" placeholder="例如: 15.0">
    </div>

    <button class="btn btn-start" id="startBtn" onclick="setMode('start')">▶ 開始監控 (清除POB紀錄)</button>
    <button class="btn btn-stop" id="stopBtn" onclick="setMode('stop')" style="display: none;">■ 停止監控</button>

    <div id="loading"></div>
</div>

<script>
    // ==========================================
    // ⚠️ 部署必改：請將下方網址換成您 GAS 最新發布的 Web App URL
    // ==========================================
    const FIXED_GAS_API_URL = "https://script.google.com/macros/s/AKfycbwSs0kDZbl6Whua7UKmUMk1rlCuFgJHFhSIUA0nVTVmLujhrlbVXdiem4rN5WJIEg9brA/exec?";

    let refreshInterval;

    // 格式化目前時間為 HH:mm 以利比對
    function getCurrentTimeHHMM() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        return `${hh}:${mm}`;
    }

    // 更新動態說明框邏輯 (NV3.0 核心)
    function updateDynamicBox(data) {
        const box = document.getElementById('dynamicBox');
        const shipName = data.shipName || "未知船隻";
        const limitSpeed = parseFloat(data.limitSpeed) || 0;
        const currentSpeed = parseFloat(data.speed) || 0;
        const seasonTime = data.seasonTime || "06:00";
        const currentTime = getCurrentTimeHHMM();
        
        box.style.display = "block";
        box.className = "dynamic-box"; // 重置 class

        // 狀態機判斷 (優先級 1 -> 4)
        if (data.pobMessage) {
            // 優先級 1: 已進港 (POB)
            box.classList.add('status-pob');
            box.innerHTML = `<strong>${shipName} 已於今日 POB進港</strong><br><span style="font-size:0.8em; margin-top:5px; display:inline-block;">(LINE回報: ${data.pobMessage})</span>`;
        } 
        else if (currentTime < seasonTime) {
            // 優先級 2: 等待進港 (未達表定時間)
            box.classList.add('status-waiting');
            box.innerHTML = `<strong>${shipName} 等待進港</strong><br><span style="font-size:0.8em;">(表定時間 ${seasonTime} 開始判定)</span>`;
        } 
        else if (currentSpeed > limitSpeed) {
            // 優先級 3: 風速超標
            box.classList.add('status-warning');
            box.innerHTML = `<strong>${shipName} 風速超標</strong><br><span style="font-size:0.8em;">(目前 ${currentSpeed} > 限制 ${limitSpeed})</span>`;
        } 
        else {
            // 優先級 4: 可進港 (綠色呼吸燈)
            box.classList.add('status-safe');
            box.innerHTML = `<strong style="font-size:1.3em;">${shipName} 可進港</strong>`;
        }
    }

    function fetchData() {
        document.getElementById('loading').innerText = "更新資料中...";
        fetch(FIXED_GAS_API_URL + "action=display")
            .then(response => response.json())
            .then(data => {
                // 更新風速數值
                document.getElementById('windSpeed').innerText = data.speed ? data.speed : "--";
                document.getElementById('dataTime').innerText = "最後更新: " + (data.time ? data.time : "無資料");
                
                // 更新輸入框
                if (document.activeElement !== document.getElementById('shipName')) {
                    document.getElementById('shipName').value = data.shipName;
                }
                if (document.activeElement !== document.getElementById('limitSpeed')) {
                    document.getElementById('limitSpeed').value = data.limitSpeed;
                }

                // 切換按鈕與狀態
                if (data.currentMode === 'start') {
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('stopBtn').style.display = 'block';
                    document.getElementById('shipName').disabled = true;
                    document.getElementById('limitSpeed').disabled = true;
                    
                    // 根據資料更新動態說明框
                    updateDynamicBox(data);
                } else {
                    document.getElementById('startBtn').style.display = 'block';
                    document.getElementById('stopBtn').style.display = 'none';
                    document.getElementById('shipName').disabled = false;
                    document.getElementById('limitSpeed').disabled = false;
                    
                    // 停止狀態隱藏說明框
                    document.getElementById('dynamicBox').style.display = 'none';
                }
                
                document.getElementById('loading').innerText = "";
            })
            .catch(error => {
                document.getElementById('loading').innerText = "連線失敗，請稍後再試";
                console.error('Error:', error);
            });
    }

    function setMode(mode) {
        document.getElementById('loading').innerText = "設定中...";
        let url = FIXED_GAS_API_URL + "action=set_mode&mode=" + mode;
        
        if (mode === 'start') {
            const shipName = document.getElementById('shipName').value;
            const limitSpeed = document.getElementById('limitSpeed').value;
            if(!shipName || !limitSpeed) {
                alert("請填寫船名與限制風速！");
                document.getElementById('loading').innerText = "";
                return;
            }
            url += "&ship_name=" + encodeURIComponent(shipName) + "&limit_speed=" + encodeURIComponent(limitSpeed);
        }

        fetch(url)
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    fetchData(); // 設定成功後立刻刷新畫面
                }
            })
            .catch(error => {
                document.getElementById('loading').innerText = "設定失敗";
                console.error('Error:', error);
            });
    }

    // 網頁載入時執行
    window.onload = function() {
        fetchData();
        refreshInterval = setInterval(fetchData, 60000); // 每分鐘刷新一次
    };
</script>

</body>
</html>
